oes the following command achieve, Telnet <IP Address> <Port 80> HEAD /HTTP/1.0 <Return> <Return>?","a":"This command returns the banner of the website specified by the IP address","d":["It establishes an FTP connection","It performs a traceroute","It pings the web server","It checks for open SMTP ports"],"c":"G","s":"","e":"Sending HEAD over telnet to port 80 returns the server's HTTP headers, a manual banner grab."},{"id":416,"q":"What does BTLE stand for?","a":"BlueTooth Low Energy","d":["Binary Transmission Layer Encoding","Base Terminal Link Extension","Basic Transfer Line Efficiency","Broadband Telecommunications Line Encoding"],"c":"D","s":"","e":"BTLE stands for Bluetooth Low Energy."},{"id":417,"q":"What frequency does Bluetooth operate on by default?","a":"2.4 GHz","d":["5 GHz","900 MHz","1.2 GHz","3.6 GHz"],"c":"D","s":"","e":"Bluetooth operates in the 2.4 GHz ISM band by default."},{"id":418,"q":"You would like to scan for Bluetooth devices that are used in the office. Which of the following tools would work best?","a":"RedFang","d":["Wireshark","Metasploit","Nmap","Aircrack-ng"],"c":"D","s":"","e":"RedFang is a tool for discovering non-discoverable (hidden) Bluetooth devices."},{"id":419,"q":"Searching the Whois repository for a penetration testing customer has provided the name and telephone number of a member of staff. Which of the following techniques COULD DIRECTLY be used by an attacker with this information?","a":"Social engineering","d":["Brute force attack","SQL injection","Cross-site scripting (XSS)","Phishing attack"],"c":"I","s":"","e":"A named contact and phone number directly enable social engineering, such as a pretext phone call."},{"id":420,"q":"Which of the following is not a valid RIR (Regional Internet Registry)?","a":"AFNIC","d":["ARIN","APNIC","RIPE NCC","LACNIC"],"c":"E","s":"","e":"AFNIC is France's national domain registry, not a Regional Internet Registry; the RIRs are ARIN, RIPE, APNIC, LACNIC and AFRINIC."},{"id":421,"q":"In the SOA record below, what is hostmaster.lab.net, lab.net. 3600 IN SOA dc01.lab.net. hostmaster.lab.net. 2000093195 900 600 86400 3600?","a":"The email address of the administrator","d":["The DNS server","The domain's IP address","The TTL (Time to Live) value","The zone transfer protocol"],"c":"C","s":"","e":"In an SOA record, hostmaster.lab.net is the administrator email, the first dot stands in for the @ sign."},{"id":422,"q":"In the SOA record below, which is the serial number of the DNS server, lab.net. 3600 IN SOA dc01.lab.net. hostmaster.lab.net. 2000093195 900 600 86400 3600?","a":"2000093195","d":["3600","900","600","86400"],"c":"C","s":"","e":"The large number (2000093195) is the zone serial, incremented every time the zone changes."},{"id":423,"q":"One of your team members has asked you to analyze the following SOA record: Test123.com.SOA NS1.test123.com person.com (200509024 3600 3600 604800 2400) Based on this information, which of the following is the correct TTL?","a":"2400","d":["3600","604800","200509024","1200"],"c":"C","s":"","e":"The final value in the SOA tuple (2400) is the minimum/default TTL."},{"id":424,"q":"What does the DNS SOA record type stand for?","a":"Start of Authority","d":["System of Authentication","Source of Authority","Security of Access","State of Application"],"c":"C","s":"","e":"SOA stands for Start of Authority, the record holding a zone's authoritative metadata."},{"id":425,"q":"What does the following query attempt to do, where dns.target.com is a DNS server: dig @dns.target.com version.bind txt chaos?","a":"Identify the software version","d":["Check for DNS poisoning","Perform a zone transfer","Scan for open ports","Retrieve the MX record"],"c":"C","s":"","e":"It asks the DNS server for its software version via the CHAOS-class version.bind record."},{"id":426,"q":"Which of the following commands attempts to obtain a zone transfer?","a":"dig @<server> <host> axfr","d":["nslookup -type=ANY <domain>","host -l <domain>","whois <domain>","ping -a <IP address>"],"c":"C","s":"","e":"dig @server host axfr is the command that attempts a DNS zone transfer."},{"id":427,"q":"Which of the following is a type of DNS record?","a":"All of the above","d":["A record","MX record","CNAME record","NS record"],"c":"C","s":"","e":"All of the listed entries (A, MX, etc.) are valid DNS record types."},{"id":428,"q":"Which of the following terms should replace something in the following description? [Source: Name Server Operations Guide for BIND Release 4.9.5]. A thing is a point of delegation in the DNS tree. It contains all names from a certain point 'downward' except those which are delegated to other things.","a":"Zone","d":["Domain","Record","Cache","Host"],"c":"C","s":"","e":"A zone is the point of delegation in DNS, holding all names below it except those sub-delegated elsewhere."},{"id":429,"q":"You are hoping to exploit a DNS server and access the zone records. As such, when does a secondary name server request a zone transfer from a primary name server?","a":"When a primary SOA serial number is higher than a secondary SOA","d":["When the TTL expires","Whenever a DNS query is made","After 24 hours","When the primary name server reboots"],"c":"C","s":"","e":"A secondary requests a zone transfer when the primary's SOA serial number is higher, signalling the zone changed."},{"id":430,"q":"You have become concerned that someone could attempt to poison your DNS server. What determines how long cache poisoning would last?","a":"SOA","d":["TTL","MX record","NS record","A record"],"c":"C","s":"","e":"How long poisoned data persists is bounded by the record's TTL, whose default comes from the SOA."},{"id":431,"q":"What helps ensure availability in the event of an extended power outage?","a":"Generators","d":["UPS (Uninterruptible Power Supply)","Redundant servers","RAID systems","Cooling systems"],"c":"B","s":"","e":"Backup generators maintain availability during an extended power outage."},{"id":432,"q":"Which of the following provides fault tolerance through disk mirroring?","a":"RAID-1","d":["RAID-0","RAID-5","RAID-6","RAID-10"],"c":"B","s":"","e":"RAID-1 (mirroring) provides fault tolerance by duplicating data across two disks."},{"id":433,"q":"What does the following SNMP command do, assuming private to be the correct read-write community name for the Cisco router <device name>? C:\\>snmpset -v 1 -c private <device name> ccCopyProtocol.<random number> integer 1 ccCopySourceFileType.<Random number> integer 1 ccCopyDestFileType.<Random number> integer 3 ccCopyServerAddress.<Random number> ipaddress \"<server ip address>\" ccCopyFileName.<Random number> octetstring \"<file name>\" ccCopyEntryRowStatus.<Random number> integer 4?","a":"Copies the Startup-Configuration <file name> from the TFTP server <server ip address> to the router <device name>","d":["Deletes the router's running configuration","Backs up the router's configuration to a local file","Updates the router's firmware","Resets the router to factory settings"],"c":"D","s":"","e":"This SNMP set copies the startup-config from a TFTP server onto the Cisco router, abusing a write community string."},{"id":434,"q":"What does the following SNMP MIB do then used in conjunction with the variable x? .1.3.6.1.4.1.9.2.1.53.172.16.2.1?","a":"Copies the Configuration x from the TFTP server <server ip address> to the router <device name>","d":["Deletes the configuration file","Monitors the router's traffic","Generates a log report","Changes the community string"],"c":"D","s":"","e":"This MIB write copies a configuration file from a TFTP server onto the Cisco router via SNMP."},{"id":435,"q":"What is the correct SNMP MIB for enumerating Users on Windows?","a":"1.3.6.1.4.1.77.1.2.25","d":["1.3.6.1.2.1.25.1.6","1.3.6.1.4.1.9.2.1.53","1.3.6.1.4.1.42.1.1.1","1.3.6.1.4.1.15.1.4.1"],"c":"D","s":"","e":"1.3.6.1.4.1.77.1.2.25 is the SNMP MIB OID for enumerating Windows user accounts."},{"id":436,"q":"What is the correct SNMP MIB for listing UNIX Process Owners?","a":"1.3.6.1.4.1.42.3.12.1.8","d":["1.3.6.1.4.1.77.1.2.25","1.3.6.1.2.1.25.1.1","1.3.6.1.4.1.9.2.1.53","1.3.6.1.2.1.6.13"],"c":"D","s":"","e":"1.3.6.1.4.1.42.3.12.1.8 is the SNMP MIB OID for listing UNIX process owners."},{"id":437,"q":"When downloading the running config from a Cisco router, which of the following sets the SourceFileType to running-config?","a":"snmpset -c <community> -v 1 <device> 1.3.6.1.4.1.9.9.96.1.1.1.1.3.111 i 4","d":["snmpget -v 2c -c <community> <device> sysDescr.0","copy tftp running-config","snmpwalk -v 1 -c <community> <device>","snmpget -v 1 -c <community> <device> 1.3.6.1.4.1.9.2.1.55"],"c":"D","s":"","e":"This snmpset writes SourceFileType=running-config (value 4) to pull the Cisco running configuration."},{"id":438,"q":"Which of the following is a weak, reversible cipher that can be used by Cisco routers to encrypt passwords?","a":"Type 7","d":["AES","3DES","RSA","SHA-256"],"c":"B","s":"","e":"Cisco Type 7 is a weak, reversible password encoding that is trivially decoded."},{"id":439,"q":"Which of the following is considered a vulnerability of SNMP?","a":"Clear text community strings","d":["Limited encryption support","High bandwidth usage","Incompatibility with IPv6","Complex configuration"],"c":"D","s":"","e":"SNMP v1/v2c send their community strings in clear text, a key vulnerability."},{"id":440,"q":"Which of the following uses a data structure, in the form of a tree, known as a Management Information Base (MIB)?","a":"SNMP","d":["FTP","DNS","HTTP","Telnet"],"c":"D","s":"","e":"SNMP organises managed data as a tree called the Management Information Base (MIB)."},{"id":441,"q":"You have just completed a scan of your servers, and you found port 12345 open. Which of the following programs uses that port by default?","a":"NetBus","d":["MySQL","Telnet","HTTP","SSH"],"c":"J","s":"","e":"TCP 12345 is the default port of the NetBus trojan."},{"id":442,"q":"After gaining access to a span of network that connects local systems to a remote site, you discover that you can easily intercept traffic and data. Which of the follow should you recommend in your report as a countermeasure?","a":"Encryption","d":["Using a firewall","Changing IP addresses","Disabling DHCP","Implementing NAT"],"c":"D","s":"","e":"Even with access to the link, encryption of the traffic prevents you from reading what you capture."},{"id":443,"q":"As you prepare to set up a covert channel using Netcat, you are worried about your traffic being sniffed on the network. Which of the following is your best option?","a":"Use cryptcat instead","d":["Use nmap","Use Wireshark","Use telnet","Use SSH"],"c":"F","s":"","e":"Use cryptcat (encrypted netcat) so your covert channel's traffic cannot be read if it is sniffed."},{"id":444,"q":"What happens if the TTL (time to live) reaches 0 before a given packet arrives at its destination?","a":"The datagram is discarded and an ICMP error message is sent back to the sender","d":["The packet is routed to the nearest router","The packet's TTL is reset","The packet continues to the next hop","The packet is redirected to an alternate path"],"c":"B","s":"","e":"When TTL reaches 0 the packet is discarded and an ICMP Time Exceeded message is returned to the sender."},{"id":445,"q":"Which of the following is characteristic of C2C (command & control) traffic?","a":"There is no distinct characteristic","d":["Always uses TCP port 80","Encrypted using SSL","Always contains a specific header","Travels only over UDP"],"c":"B","s":"","e":"Command-and-control traffic has no single distinct signature, which is exactly what makes it hard to detect."},{"id":446,"q":"A network you are testing has NAC, that filters the MAC address of devices. Which of the following would you be likely to do in order to gain access to the network?","a":"Plug into the same port, and forge the MAC address of the host you have unplugged","d":["Send a deauthentication packet","Use a different IP address","Change the subnet mask","Attempt an ARP poisoning attack"],"c":"B","s":"","e":"To beat MAC-filtering NAC, unplug the trusted host, take its switch port, and spoof its MAC address."},{"id":447,"q":"What is this: 17:57:57.850175 802.1d config 8064.00:0c:85:f1:3f:80.8010 root 8064.00:0b:46:48:29:80 pathcost 19 age 1 max 20 hello 2 fdelay 15?","a":"A Spanning Tree Protocol broadcast","d":["An ARP request","A RIP update packet","A BGP keepalive message","An OSPF hello packet"],"c":"D","s":"","e":"An 802.1d config/root frame is a Spanning Tree Protocol BPDU."},{"id":448,"q":"Which of the following protocols is proprietary to Cisco?","a":"CDP","d":["LLDP","STP","OSPF","RIP"],"c":"D","s":"","e":"CDP (Cisco Discovery Protocol) is proprietary to Cisco."},{"id":449,"q":"Your sniffing attempts have been less than successful, as the targeted LAN is using a switched network. Luckily, a co-worker introduced you to Cain. What type of attack can Cain perform against switches to make your sniffing attempt more successful?","a":"ARP poisoning","d":["MAC flooding","DNS spoofing","Ping of death","Man-in-the-middle attack"],"c":"D","s":"","e":"On a switched LAN, ARP poisoning redirects traffic through you, enabling the sniffing a switch would otherwise prevent."},{"id":450,"q":"Which of the following is a valid sequence of SIP methods as defined by RFC 3261?","a":"REGISTER, INVITE, ACK, BYE","d":["SUBSCRIBE, NOTIFY, CANCEL, END","START, STOP, PAUSE, RESUME","GET, POST, DELETE, PUT","CONNECT, DISCONNECT, RESET, UPDATE"],"c":"D","s":"","e":"A valid SIP call sequence is REGISTER, INVITE, ACK, BYE."},{"id":451,"q":"Which of the following is not a valid SIP method as defined by RFC 3261?","a":"HANGUP","d":["ACK","BYE","OPTIONS","CANCEL"],"c":"D","s":"","e":"HANGUP is not a valid SIP method; BYE is used to end a call."},{"id":452,"q":"Disabling which of the following would make your wireless network more secure against unauthorized access?","a":"Service Set ID (SSID) broadcasting","d":["WPA2 encryption","MAC filtering","DHCP","Wireless channel auto-selection"],"c":"D","s":"","e":"Disabling SSID broadcast makes the network slightly less visible, though the SSID still leaks in other frames."},{"id":453,"q":"WEP uses a 4 byte Integrity Check Value (ICV) computed on the original packet using the CRC-32 checksum algorithm and appended to the end. What attack would an attacker be trying to achieve by transmitting a packet without an ICV?","a":"Forcing a client into reassociating with the access point","d":["Packet injection","ARP cache poisoning","MAC address spoofing","Dictionary attack"],"c":"D","s":"","e":"Forcing a client to reassociate (e.g. via deauth) generates handshakes/traffic useful for WEP and WPA attacks."},{"id":454,"q":"Which of the following packets reveals the SSID of a cloaked Access Point?","a":"Association request","d":["Probe response","Beacon frame","ARP request","Authentication request"],"c":"D","s":"","e":"A cloaked AP's SSID is revealed in the association/probe request when a legitimate client connects."},{"id":455,"q":"Which of the following are potential benefits of deauthentication attack against one or more wireless clients? S1 Recovering a hidden ESSID S2 Capturing WPA/WPA2 handshakes S3 Generating ARP requests?","a":"S1 and S2 only","d":["S1 only","S2 only","S2 and S3 only","S1, S2, and S3"],"c":"D","s":"","e":"Deauthentication can capture WPA handshakes and force reconnection (a DoS), the benefits S1 and S2."},{"id":456,"q":"Which of the following authentication mechanisms can provide centralized authentication for a wireless network?","a":"RADIUS","d":["WEP","PSK (Pre-Shared Key)","EAP-MD5","802.1X"],"c":"D","s":"","e":"RADIUS provides centralised authentication for wireless via WPA-Enterprise/802.1X."},{"id":457,"q":"Which of the following does not provide server authentication?","a":"EAP-MD5","d":["EAP-TLS","EAP-PEAP","EAP-TTLS","EAP-FAST"],"c":"D","s":"","e":"EAP-MD5 provides no server authentication and is one-way, leaving clients open to rogue access points."},{"id":458,"q":"Which of the following may be described as: part of the EEE 802.11i standard, implements per-packet key mixing with a re-keying system and also provides a message integrity check?","a":"TKIP","d":["AES","WPA2","EAP","RC4"],"c":"D","s":"","e":"TKIP is the 802.11i component that does per-packet key mixing as an interim WEP fix."},{"id":459,"q":"Which of the following statements about SSIDs is correct?","a":"The SSID is broadcast in clear text","d":["The SSID is encrypted by default","The SSID is hashed before transmission","The SSID is not transmitted in management frames","The SSID cannot be changed once set"],"c":"D","s":"","e":"The SSID is broadcast in clear text, so hiding it offers little real security."},{"id":460,"q":"Which one of the following security mechanisms did WEP implement incorrectly, allowing attackers to crack it?","a":"RC4","d":["AES","SHA-256","Diffie-Hellman","Blowfish"],"c":"B","s":"","e":"WEP implemented RC4 incorrectly (weak, reused IVs), letting attackers recover the key."},{"id":461,"q":"While performing a penetration test for an ISP that provides Internet connection services to airports for their wireless customers, you have been presented with the following issues: The ISP uses Wireless Transport Layer Security (WTLS) and Secure Socket Layers (SSL) technology to protect the airport's end-users' authentication and payment transactions. Which of the following are you most concerned about?","a":"If a hacker were to compromise the Wireless Application Protocol (WAP) gateway","d":["The strength of the encryption keys used","Physical access to the access points","The use of WEP instead of WPA2","The lack of MAC filtering"],"c":"D","s":"","e":"Compromising the WAP gateway would expose the wireless users' traffic passing through it."},{"id":462,"q":"You are hosting a wireless hotspot, and you want to segment wireless users from each other. What should you use?","a":"Isolation mode","d":["WPA2 encryption","RADIUS authentication","VPN tunneling","Channel hopping"],"c":"D","s":"","e":"Client isolation mode stops wireless users on the same hotspot from communicating with each other."},{"id":463,"q":"You have been asked to install and turn on WEP on an access point that is used in the shipping area. Which of the following statements is true?","a":"The MAC addresses can still be sniffed","d":["WEP is unbreakable when properly configured","SSID is always hidden when using WEP","WEP protects against MAC spoofing","WEP encrypts MAC addresses"],"c":"D","s":"","e":"Even with WEP enabled, MAC addresses travel in clear text and can be sniffed (then spoofed to defeat MAC filtering)."},{"id":464,"q":"You have been asked to set up an access point and override the signal of a real access point. This way, you can capture the user's authentication as he attempts to log in. What kind of attack is this?","a":"Rogue access point","d":["Deauthentication attack","MAC spoofing","Man-in-the-middle attack","Replay attack"],"c":"B","s":"","e":"An access point set up to override a real one's signal is a rogue access point."},{"id":465,"q":"You have been reading about SSIDs and how they are transmitted in clear text. Which of the following is correct about SSIDs?","a":"SSIDs are up to 32 bits and are case sensitive","d":["SSIDs are always encrypted","SSIDs are never visible on open networks","SSIDs are stored in the access point's firmware","SSIDs can only contain numeric values"],"c":"D","s":"","e":"SSIDs are up to 32 characters and are case-sensitive."},{"id":466,"q":"You recently completed a wireless audit of your company's wireless network. You've identified several unknown devices connected to the network and realize they are devices owned by company employees. What can you use to prevent these devices from connecting?","a":"MAC filtering","d":["WPA2 encryption","Disabling SSID broadcast","Enabling DHCP reservation","Using a firewall"],"c":"D","s":"","e":"MAC filtering restricts which devices may associate, although MAC addresses can be spoofed."},{"id":467,"q":"You want to identify the physical location of a rogue access point you discovered in the footprint of your company. What would you use?","a":"War driving AP","d":["Heat mapping","Channel scanning","Network stumbler","Wi-Fi triangulation"],"c":"D","s":"","e":"War driving/walking with a directional antenna helps physically locate a rogue access point."},{"id":468,"q":"What does NAC refer to in respect to Cisco?","a":"Network Admission Control","d":["Network Access Channel","Network Authentication Control","Network Allocation Control","Network Authorization Center"],"c":"D","s":"","e":"In Cisco terms, NAC means Network Admission Control, enforcing policy before a device joins the network."},{"id":469,"q":"What would be the effect of writing the string x to the following OID on a Cisco router running IOS 11, .1.3.6.1.4.1.9.2.1.53.172.25.1.1?","a":"The configuration file x in the TFTP root of the TFTP server at 172.25.1.1 would be uploaded to the router","d":["The router configuration would be backed up to the TFTP server","The router would restart immediately","The router would connect to an external server","The configuration file x would be deleted from the TFTP server"],"c":"D","s":"","e":"Writing that OID uploads a named config file from the TFTP server onto the Cisco router via SNMP."},{"id":470,"q":"What would be the effect of writing the string x to the following OID on a Cisco router running IOS 11, .1.3.6.1.4.1.9.2.1.55.172.25.1.1?","a":"The configuration file of the router whose IP address is 172.25.1.1 would be downloaded to the local machine","d":["The router configuration would be reset to factory defaults","The router would start logging to a remote server","The router would update its firmware","The router would establish a VPN connection"],"c":"D","s":"","e":"Writing that OID makes the router download (copy out) its config to the TFTP server via SNMP."},{"id":471,"q":"When downloading a Cisco router's config file, which of the following OIDs would be used to set the SourceFileType?","a":"1.3.6.1.4.1.9.9.96.1.1.1.1.3.111","d":["1.3.6.1.2.1.9.1.1.2.99","1.3.6.1.4.1.9.9.99.1.1.1.1.4.123","1.3.6.1.4.1.9.2.1.53.100","1.3.6.1.4.1.9.1.96.1.1.1.2.4.110"],"c":"D","s":"","e":"OID ...9.9.96.1.1.1.1.3.111 sets the SourceFileType when copying a Cisco config via SNMP."},{"id":472,"q":"You are preparing to attack several critical servers and perform the following command: net use \\\\windows_server\\ipc$ “” /u:“” What is its purpose?","a":"Establishing a null session","d":["Initiating a file transfer","Starting a remote desktop session","Creating a user account","Opening a VPN tunnel"],"c":"E","s":"","e":"Connecting to IPC$ with empty credentials establishes a null (anonymous) session."},{"id":473,"q":"When working with Windows systems, what is the RID of the first user account?","a":"1000","d":["500","1100","2000","1500"],"c":"E","s":"","e":"The first normal user account is assigned RID 1000, and RIDs increment from there."},{"id":474,"q":"Which of the following best describes the purpose of LDAP?","a":"A central point for user management","d":["A protocol for email transmission","A tool for network scanning","A language for database queries","A utility for data encryption"],"c":"E","s":"","e":"LDAP provides a central directory for user and object management, the backbone of Active Directory."},{"id":475,"q":"Which of the following displays the group membership for the current user, type of account, security identifiers (SID), and attributes?","a":"whoami /groups","d":["net user /domain","gpresult /r","dsquery user","netstat -a"],"c":"E","s":"","e":"whoami /groups shows the current user's group memberships, account type and SIDs."},{"id":476,"q":"What is used for authentication in a Microsoft Active Directory domain?","a":"Kerberos","d":["RADIUS","TACACS+","LDAP","OAuth"],"c":"E","s":"","e":"Active Directory uses Kerberos as its primary authentication protocol."},{"id":477,"q":"Which of the following Windows programs will list all the members of the Master Browser List?","a":"Nbtstat","d":["Net view","Tracert","Ipconfig","Arp"],"c":"E","s":"","e":"nbtstat lists members of the Master Browser list via NetBIOS."},{"id":478,"q":"On Windows, what does setting the Account Lockout Threshold to 0 mean?","a":"The account will never be locked out (lockout is disabled)","d":["The account locks after one failed attempt","The account is locked permanently","Lockout applies only to the Administrator"],"c":"E","s":"","e":"A threshold of 0 disables lockout entirely, so password guessing is unconstrained. A non-zero value sets how many failed attempts trigger a lockout; note the built-in Administrator (RID 500) is exempt regardless."},{"id":479,"q":"Which of the following statements is TRUE immediately BEFORE the above?","a":"There is a user account called guest, with a blank password. It would not be possible to login as this account","d":["The guest account is locked with a password","The guest account has been deleted","The guest account is an admin account","The guest account has limited network access"],"c":"B","s":"","e":"A guest account with a blank password exists, but policy blocks logging in with a blank password."},{"id":480,"q":"Consider the following output, obtained from a Windows XP SAM database. Given that user CESC has a password “ARSENAL4”, which of the following is the most likely password for HENRY? User cesc RID 1041 LANMAN hash 2B02E03A31FAE1ECFF17365FAF1FFE89 NTLM hash 49CA47D9CBE6ACE90A8818AAE016732A User henry RID 1038 LANMAN hash 2B02E03A31FAE1EC120758FBF9E8A7F8 NTLM hash 5A1FF2BB59185C2CA7477EC40244AA8F?","a":"arsenal14","d":["arsenal12","arsenal10","arsenal15","arsenal09"],"c":"E","s":"","e":"Matching LM hash segments reveal the two accounts share the same password (or 7-character half)."},{"id":481,"q":"Peter has successfully stolen the SAM from a system he has been examining for several days. Here is the output: Administrator:1008:6145CBC5A0A3E8C6AAD3B435B51404EE Donald:1000:16AC416C2658E00DAAD3B435B51404EE Tony:1004:AA79E536EDFC475E813EFCA2725F52B0 Chris:0:A00B9194BEDB81FEAAD3B435B51404EE George:1003:6ABB219687320CFFAAD3B435B51404EE Billy:500:648948730C2D6B9CAAD3B435B51404EE From the preceding list, identify the user with Administrator privileges?","a":"Billy","d":["Chris","Donald","Tony","George"],"c":"F","s":"","e":"Identical SAM hashes mean the accounts share the same password (here Billy's matches a known one)."},{"id":482,"q":"Which statement accurately describes the LANMAN & NTLM Hashes?","a":"Neither are Salted","d":["Only NTLM is Salted","Only LANMAN is Salted","Both are Salted","LANMAN uses a salt but NTLM does not"],"c":"E","s":"","e":"Neither LM nor NTLM hashes are salted, which is exactly why precomputed rainbow tables work against them."},{"id":483,"q":"The domain credentials of a user are cached in which of the following formats?","a":"MS-CACHE","d":["MD5","SHA-1","NTLMv1","Base64"],"c":"B","s":"","e":"Cached domain credentials are stored in MS-CACHE (mscash) format, crackable offline but not usable for pass-the-hash."},{"id":484,"q":"Which service (typically) runs on TCP port 3389?","a":"MS-RDP","d":["Telnet","SSH","FTP","VNC"],"c":"F","s":"","e":"TCP port 3389 is Microsoft RDP (Remote Desktop Protocol)."},{"id":485,"q":"You have successfully extracted the SAM from a Windows 2000 server. Is it possible to determine if an LM hash that you're looking at contains a password fewer than eight characters long?","a":"The rightmost portion of the hash will always have the same value","d":["The hash length is reduced","The hash becomes salted","The first portion of the hash changes","The hash is marked with a special identifier"],"c":"E","s":"","e":"An LM hash of a password under 8 characters has a fixed right half (AAD3B435B51404EE), which reveals the password is 7 characters or fewer."},{"id":486,"q":"You just noticed a member of your pen test team sending an email to an address that you know does not exist within the company for which you are contracted to perform the penetration test. Why is he doing this?","a":"To generate a response back that will reveal information about email servers","d":["To test the company's spam filter","To check for email forwarding rules","To trigger a phishing attack","To verify the existence of a user account"],"c":"K","s":"","e":""},{"id":487,"q":"What frequency does RFID cards of type Mifare use?","a":"13.56 MHz","d":["125 kHz","2.4 GHz","5.8 GHz","915 MHz"],"c":"K","s":"","e":""},{"id":488,"q":"What is a Red Box?","a":"Electronic circuit that emits 2600Hz","d":["A rootkit tool","A port scanning technique","A packet sniffing device","A type of hardware keylogger"],"c":"B","s":"","e":"A Red Box is a phreaking device that emits the coin/2600Hz tones to fake payphone coin signals."},{"id":489,"q":"What binary coding is most commonly used for email purposes?","a":"Uuencode","d":["Base64","Hexadecimal","ASCII","MIME"],"c":"B","s":"","e":"Uuencode is the classic binary-to-text coding historically used for email attachments."},{"id":490,"q":"Which of the following techniques is NOT used for enumerating users?","a":"Password cracking","d":["SNMP queries","SMB enumeration","LDAP queries","NetBIOS name service scans"],"c":"E","s":"","e":"Password cracking is not user enumeration; enumeration discovers usernames via NetBIOS, SNMP or LDAP without cracking anything."},{"id":491,"q":"Assuming appropriately configured X client software is available on the affected hosts and both local and remote machine are on the same LAN segment, what should be the result of the following command on the local machine? xterm –display 10.10.10.2:0.0 &","a":"A shell is received from host 10.10.10.2 on the local machine","d":["A graphical login screen appears on the remote machine","The local machine connects to the internet","A firewall alert is triggered on the remote machine","The remote machine shuts down"],"c":"F","s":"","e":"Connecting to an open remote X server lets you grab a shell or screen from the affected host on your machine."},{"id":492,"q":"On a solaris system what does 'showrev -p' return?","a":"A list of installed patches on the system","d":["A list of active users","The system's IP address","Kernel version information","The list of mounted file systems"],"c":"F","s":"","e":"showrev -p lists the patches installed on a Solaris system."},{"id":493,"q":"Several of your co-workers are having a discussion about the etc/passwd file. They are at odds over what types of encryption are used to secure Linux passwords. Which of the following is the least likely to be used?","a":"Asymmetric algorithms","d":["MD5","SHA-256","Blowfish","Crypt"],"c":"B","s":"","e":"Linux password hashing uses one-way hashes: crypt(DES), MD5 ($1$), Blowfish/bcrypt ($2a$) and SHA-256/512 ($5$/$6$). Asymmetric (public-key) algorithms are for encryption and signatures, not password hashing, so they are the least likely to appear here."},{"id":494,"q":"Of the following choices, which one provides the most security for FTP?","a":"FTPS","d":["TFTP","Anonymous FTP","SCP","Unsecured FTP"],"c":"F","s":"","e":"FTPS (FTP over TLS) provides the most security among the listed FTP options."},{"id":495,"q":"What does the following PORT command mean, PORT 10,2,0,2,10,10?","a":"The FTP client at 10.2.0.2 will be listening on TCP port 2570","d":["The server will use port 21","The client is using port 22 for SFTP","The server will listen on UDP 10.10","The client is establishing a control connection on port 80"],"c":"B","s":"","e":"In an FTP PORT command a,b,c,d,p1,p2 the client IP is a.b.c.d (10.2.0.2) and the data port is p1*256+p2 = 10*256+10 = 2570. Active-mode FTP tells the server where to connect back."},{"id":496,"q":"What does the acronym FTP stand for?","a":"File Transfer Protocol","d":["File Tracking Program","File Transfer Path","Fast Transfer Protocol","File Transport Platform"],"c":"F","s":"","e":"FTP stands for File Transfer Protocol."},{"id":497,"q":"What is the correct sequence to send SMTP mail?","a":"HELO, MAIL FROM, RCPT TO, DATA.","d":["EHLO, RCPT TO, MAIL FROM, DATA","MAIL FROM, RCPT TO, HELO, DATA","DATA, HELO, MAIL FROM, RCPT TO","RCPT TO, MAIL FROM, DATA, HELO"],"c":"F","s":"","e":"The SMTP send sequence is HELO, MAIL FROM, RCPT TO, then DATA."},{"id":498,"q":"You have local un-privileged access to the server and access to users' home directories over NFS. NFS is configured with SQUASH_ROOT. Your target is the information inside the following file owned by the bin user.; /etc/target.conf. How will you retrieve the file contents?","a":"Upload a SUID owned bin shell to the NFS share, and SSH into the server and run the executable to read the file","d":["Edit the /etc/passwd file directly","Mount the NFS share with admin privileges","Use scp to copy the file","Log in as the root user"],"c":"F","s":"","e":"With no_root_squash you can place a root-owned SUID shell on the NFS share, then run it on the server to gain root."},{"id":499,"q":"You discover a .rhosts file in the home directory of user chris on host tom. The file contains the following line: andrew arthur Which of the following statements is true?","a":"User arthur on host andrew can login to host tom as user chris without authentication","d":["User andrew on host tom can log in as user arthur","User chris on host tom can log in to host andrew","User tom can access user chris' files on host andrew","No login is possible with this setup"],"c":"F","s":"","e":"A .rhosts entry naming host andrew and user arthur lets arthur log into host tom as chris with no password."},{"id":500,"q":"Which of the following commands will allow 172.16.5.13 to access the X11 service?","a":"xhost +","d":["xauth -display 172.16.5.13","xclient -enable 172.16.5.13","xconnect 172.16.5.13","xlock -set 172.16.5.13"],"c":"F","s":"","e":"xhost + disables X access control, letting the listed host (in fact any host) connect to the X server."},{"id":501,"q":"Which of the following commands can be used to determine whether an X server is accessible on 172.16.0.1:0.0?","a":"xdpyinfo -display 172.16.0.1:0.0","d":["xwininfo -display 172.16.0.1:0.0","xset -display 172.16.0.1:0.0","xauth -check 172.16.0.1:0.0","xlist -display 172.16.0.1:0.0"],"c":"F","s":"","e":"xdpyinfo -display target:0.0 tests whether a remote X server is reachable and accessible."},{"id":502,"q":"Which of the following ports is used for the XDMCP service?","a":"UDP 177","d":["TCP 23","UDP 69","TCP 515","UDP 514"],"c":"B","s":"","e":"XDMCP (the X Display Manager Control Protocol) uses UDP port 177."},{"id":503,"q":"What is the purpose of port 111?","a":"To allow the lookup of RPC services that bind to dynamic ports","d":["To serve HTTP traffic","To enable FTP connections","To authenticate SNMP requests","To manage DNS queries"],"c":"F","s":"","e":"Port 111 (the RPC portmapper) lets clients look up RPC services that bind to dynamic ports."},{"id":504,"q":"What port does the Unix portmapper use by default?","a":"UDP111","d":["TCP 80","TCP 21","UDP 161","TCP 25"],"c":"F","s":"","e":"The Unix portmapper listens on UDP (and TCP) port 111."},{"id":505,"q":"Which of the following RPC program numbers represents ttdbserverd?","a":"100083","d":["100002","200001","150001","200083"],"c":"F","s":"","e":"RPC program number 100083 is ttdbserverd, the ToolTalk database server, historically exploitable."},{"id":506,"q":"What is true about default credentials on Cisco IOS enterprise devices?","a":"There is no default username/password; credentials are set during initial configuration","d":["The default SSH password is 'Alpine'","The default login is admin/admin","SSH is enabled with no password by default"],"c":"D","s":"","e":"Cisco IOS enterprise gear ships with no default credentials (secure-by-default); a few SMB models use cisco/cisco. 'Alpine' is the default root password on jailbroken iPhones, not Cisco devices."},{"id":507,"q":"Which of the following protocols is a file transfer protocol using SSH?","a":"SFTP","d":["FTP","FTPS","TFTP","HTTP"],"c":"F","s":"","e":"SFTP is the file-transfer protocol that runs over SSH, so it is encrypted."},{"id":508,"q":"Of the following choices, what represents the best choice to prevent intrusions on an individual computer?","a":"Host-based firewall","d":["Network-based firewall","Proxy server","Router ACL","VPN"],"c":"D","s":"","e":"A host-based firewall is the best per-computer control for blocking intrusions on an individual machine."},{"id":509,"q":"Which Of the following choices, what is the best choice for a device to filter and cache content from web pages?","a":"Proxy server","d":["Firewall","Switch","Router","Hub"],"c":"D","s":"","e":"A proxy server filters and caches web content."},{"id":510,"q":"Which is the correct set of network components that need to be available for the Internet-facing network card of a dual-homed IIS Web server running on Windows 2000?","a":"Internet Protocol (TCP/IP)","d":["NetBIOS","IPX/SPX","AppleTalk","DECnet"],"c":"G","s":"","e":"The internet-facing card of a dual-homed firewall should bind only TCP/IP, with other bindings removed to reduce exposure."},{"id":511,"q":"Which of the following services is not required to run a Windows server solely configured to run IIS and publish a Web site?","a":"Server Service","d":["World Wide Web Publishing Service","HTTP SSL","FTP Publishing Service","IIS Admin Service"],"c":"G","s":"","e":"A server dedicated to IIS does not need the Server service (file and printer sharing)."},{"id":512,"q":"Which of the following vulnerabilities allows an attacker to take control of an IIS webserver from the Internet through a firewall?","a":"ISAPI Extension buffer overflows","d":["Cross-Site Scripting (XSS)","Directory traversal","SQL Injection","Brute force login"],"c":"I","s":"","e":"ISAPI extension buffer overflows (e.g. the classic .ida/.printer flaws) let an attacker take over IIS remotely."},{"id":513,"q":"You have successfully run an exploit against an IIS4 server. Which of the following is the default privilege you will have within the command shell that you have spawned?","a":"Local system","d":["Guest","Network service","Administrator","IUSR_Machine"],"c":"G","s":"","e":"An exploit against IIS4 typically gives LocalSystem-level privileges."},{"id":514,"q":"You have successfully run an exploit against an IIS6 server. Which of the following default privileges will you have within the command shell that you have spawned?","a":"IUSR_Computername","d":["Administrator","SYSTEM","Guest","Network Service"],"c":"G","s":"","e":"On IIS6 the web process runs as the low-privileged anonymous IUSR account, so an exploit starts with limited rights."},{"id":515,"q":"You noticed the following entry: http://server/cgi-bin/phf?Qalias=x%0a/bin/cat%20/etc/passwd What is the attacker attempting to do?","a":"Exploit a vulnerability in a CGI script","d":["Initiate a SQL injection attack","Attempt a Cross-Site Scripting (XSS) attack","Execute a buffer overflow","Perform a Directory Traversal"],"c":"I","s":"","e":"The %0a injects a newline so the vulnerable phf CGI runs /bin/cat /etc/passwd, exploiting a CGI flaw."},{"id":516,"q":"Of the following protocols, which one does not encrypt the entire authentication process, but instead only encrypts the password in traffic between the client and server?","a":"RADIUS","d":["Kerberos","SSL/TLS","IPSec","SSH"],"c":"D","s":"","e":"RADIUS encrypts only the password field, not the whole authentication exchange (unlike TACACS+)."},{"id":517,"q":"What is RADIUS?","a":"Remote Authentication Dial In User Service","d":["Routing and Distance Information Under Service","Regional Address Database in User Systems","Remote Access Dial-up Interface User Service","Remote Authentication Database Information User Service"],"c":"D","s":"","e":"RADIUS stands for Remote Authentication Dial-In User Service, a centralised AAA protocol."},{"id":518,"q":"When the response to a web request includes the following response, which of the web technologies listed below is most likely to be in use? Set-Cookie: ARPT=ITOUQOwebserver1CKUQW","a":"A Cisco Content Service Switch (CSS)","d":["An Apache Web Server","A Microsoft IIS Server","A load balancer","A reverse proxy server"],"c":"G","s":"","e":"The response identifies a Cisco Content Services Switch, a load balancer in front of the web server."},{"id":519,"q":"What does the HTTP response code 307 mean?","a":"Temporary Redirect","d":["Permanent Redirect","Found","Not Modified","See Other"],"c":"G","s":"","e":"HTTP 307 is a Temporary Redirect that, unlike 302, preserves the original request method (e.g. a POST stays a POST). 308 is the permanent equivalent."},{"id":520,"q":"What does the HTTP response code 413 mean?","a":"Request Entity Too Large","d":["Unsupported Media Type","Internal Server Error","Length Required","URI Too Long"],"c":"G","s":"","e":"HTTP 413 means Request Entity Too Large."},{"id":521,"q":"Which of the following describes the HTTP status code 407?","a":"Proxy Authentication Required","d":["Unauthorized","Forbidden","Payment Required","Conflict"],"c":"G","s":"","e":"HTTP 407 means Proxy Authentication Required."},{"id":522,"q":"Which of the following is NOT an example of an HTTP Web Verb?","a":"PROPERFIND","d":["GET","POST","PUT","DELETE"],"c":"G","s":"","e":"PROPERFIND is not a real verb; the WebDAV method is PROPFIND."},{"id":523,"q":"Which port does HTTPS use?","a":"443","d":["80","21","8080","22"],"c":"G","s":"","e":"HTTPS uses TCP 443."},{"id":524,"q":"Which of the following software products is not used to defend against buffer overflows?","a":"C+","d":["ASLR","DEP","StackGuard","SafeSEH"],"c":"B","s":"","e":"C+ is not a buffer-overflow defence (it is not even a real tool); StackGuard, DEP and ASLR are."},{"id":525,"q":"Which of the following is the correct definition of NASL?","a":"NASL is a scripting language designed for the Nessus security scanner.","d":["NASL is a network-attached storage language.","NASL is a protocol used for network security.","NASL is a file transfer protocol.","NASL is a scripting language for Snort."],"c":"B","s":"","e":"NASL is the Nessus Attack Scripting Language, used to write Nessus vulnerability checks."},{"id":526,"q":"Which of the following best describes passive information gathering?","a":"Reconnaissance","d":["Exploitation","Vulnerability scanning","Penetration testing","Privilege escalation"],"c":"C","s":"","e":"Passive information gathering is reconnaissance performed without directly touching the target."},{"id":527,"q":"While searching a website, you have been unable to find information that was on the site several months ago. What might you do to attempt to locate that information?","a":"Use the wayback machine","d":["Check the DNS records","Use a web crawler","Contact the webmaster","Access the server logs"],"c":"C","s":"","e":"The Wayback Machine (web archive) can recover content that was removed from the live site."},{"id":528,"q":"You have been tasked with examining the web pages of a target site. You have grown tired of looking at each online. Which of the following offers a more efficient way of performing this task?","a":"Using wget to download all pages for further inspection","d":["Using ping to download all pages","Using nslookup to download all pages","Using traceroute to analyze the website","Using dig to retrieve DNS records"],"c":"C","s":"","e":"wget can mirror an entire site locally for offline review, far faster than opening each page."},{"id":529,"q":"You would like to find out more information about a website from a company based in France. Which of the following is a good starting point?","a":"RIPE","d":["ARIN","APNIC","LACNIC","AFRINIC"],"c":"C","s":"","e":"RIPE is the regional internet registry for Europe, the right place to look up European IP and domain data."},{"id":530,"q":"Placing the following into the input field of a web-based application would be an example of what type of attack, '+or+1%3D1+UNION+SELECT+'---'%7C%7C+banner+FROM+v$version— ?","a":"SQL injection","d":["Cross-Site Scripting (XSS)","Buffer Overflow","Command Injection","LDAP Injection"],"c":"I","s":"","e":"UNION SELECT pulling banner FROM v$version is Oracle SQL injection extracting the database version."},{"id":531,"q":"Which part of the following SQL Server password hash is the salt value, 0x01008444930543174C59CC918D34B6A12C9CC9E?","a":"84449305","d":["01008444","30543174","CC918D34","C9CC9E"],"c":"B","s":"","e":"In that MSSQL hash the salt is the 4-byte value following the 0x0100 header (here 84449305)."},{"id":532,"q":"How many characters is the output of an MD5sum?","a":"32 characters","d":["16 characters","40 characters","64 characters","128 characters"],"c":"B","s":"","e":"An MD5 digest is 32 hexadecimal characters (128 bits)."},{"id":533,"q":"Which of the following best describes what happens when two message digests produce the same hash?","a":"Collisions","d":["Hash overflow","Redundancy","Replication","Duplication"],"c":"B","s":"","e":"Two different inputs producing the same digest is a hash collision."},{"id":534,"q":"Which of the following is the best example of a strong two-factor authentication?","a":"A token and a pin number","d":["Username and password","Finger scan and retina scan","Security questions and answers","Biometric and password"],"c":"H","s":"","e":"A hardware token (have) plus a PIN (know) is strong two-factor authentication."},{"id":535,"q":"Which of the following vulnerabilities can be associated with Password Autocomplete being enabled on a web page visible from the Internet?","a":"A vulnerability on a client workstation could be leveraged to discover and take advantage of cached passwords","d":["Cross-Site Scripting (XSS)","SQL Injection","Command Injection","Session Hijacking"],"c":"I","s":"","e":"Saved/autocomplete passwords can be recovered and abused if the client workstation is compromised."},{"id":536,"q":"While examining the company’s website for vulnerabilities, you received the following error: Microsoft OLE DB Provider for ODBC Drivers error ‘80040e14’. What does it mean?","a":"The site is vulnerable to SQL injection","d":["The database is offline","The server is overloaded","The website is using SSL","The web application is misconfigured"],"c":"I","s":"","e":"That OLE DB/ODBC provider error means your input reached the database, a sign of SQL injection."},{"id":537,"q":"What type of attack does the following describe 'poisoning a proxy server's cache with malicious content, in order to compromise other users who access the application via the proxy'?","a":"Proxy cache poisoning","d":["DNS spoofing","ARP poisoning","Session fixation","Cross-Site Request Forgery (CSRF)"],"c":"H","s":"","e":"Poisoning a shared proxy cache with malicious content compromises everyone who fetches the app through it."},{"id":538,"q":"How would Bob prove to Alice that he is the original creator of a document?","a":"Sign it with Bob's private key","d":["Encrypt it with Bob's public key","Sign it with Alice's private key","Encrypt it with Alice's public key","Use a shared secret key"],"c":"B","s":"","e":"Bob signs the document with his private key; anyone can verify it with his public key, proving authorship."},{"id":539,"q":"Of the following choices, what is the best way to protect the confidentiality of data?","a":"Encryption","d":["Hashing","Digital Signatures","Firewall","Access Control Lists"],"c":"B","s":"","e":"Encryption is the best way to protect the confidentiality of data."},{"id":540,"q":"The following request to an IIS webserver is an example of what kind of attack? http://www.example.com/scripts/..%255c../winnt/system32/attrib.exe?c:\\*.*?","a":"IIS Unicode double decode directory traversal","d":["SQL Injection","Cross-Site Scripting (XSS)","Buffer Overflow","Command Injection"],"c":"I","s":"","e":"%255c double-decodes to a backslash, escaping the web root, this is the IIS Unicode directory-traversal bug."},{"id":541,"q":"You discovered the following in the logs: 192.186.13.100/myserver.aspx..%255C..%255C..%255C..%255C..%255C..%255C..%255C..%255C..%255C..%255..c:\\winnt\\system32\\cmd.exe%/c:dir What is the hacker attempting to do?","a":"Directory traversal attack","d":["SQL Injection","Cross-Site Request Forgery (CSRF)","Denial of Service (DoS) Attack","Remote File Inclusion"],"c":"H","s":"","e":"The repeated ..%255c sequences traverse directories to reach and execute cmd.exe, a directory-traversal attack."},{"id":542,"q":"What command allows code execution on MSSQL?","a":"xp_cmdshell","d":["sp_execute","db_execute","ms_execute","sys_exec"],"c":"J","s":"","e":"xp_cmdshell runs operating-system commands from inside Microsoft SQL Server."},{"id":543,"q":"Which is the default port for MySQL?","a":"3306","d":["1521","1433","5432","8080"],"c":"J","s":"","e":"MySQL's default port is TCP 3306."},{"id":544,"q":"What is the default password for the account SYS in Oracle 10?","a":"CHANGE_ON_INSTALL","d":["oracle","admin123","password","manager"],"c":"J","s":"","e":"The default SYS password on older Oracle is CHANGE_ON_INSTALL."},{"id":545,"q":"What is the default password for the account SYS in Oracle 9?","a":"CHANGE_ON_INSTALL","d":["SYSDBA","system","oracle123","welcome"],"c":"J","s":"","e":"The default SYS password on Oracle 9 is CHANGE_ON_INSTALL."},{"id":546,"q":"What is the default password for the Oracle account DBSNMP?","a":"DBSNMP","d":["oracle","admin","password","monitor"],"c":"J","s":"","e":"Oracle's DBSNMP account has the default password DBSNMP."},{"id":547,"q":"What is the default password for the SYS user on Oracle 10g?","a":"CHANGE_ON_INSTALL","d":["oracle","manager","welcome","admin123"],"c":"J","s":"","e":"The default SYS password on Oracle 10g is CHANGE_ON_INSTALL."},{"id":548,"q":"What is the default password for the SYSTEM user on Oracle 9i?","a":"MANAGER","d":["oracle","system123","password","administrator"],"c":"J","s":"","e":"The default SYSTEM password on Oracle 9i is MANAGER."},{"id":549,"q":"Which of the following is NOT a default Oracle username/password (any version of oracle)?","a":"DBSMTP/DBSMTP","d":["SCOTT/TIGER","SYS/CHANGE_ON_INSTALL","SYSTEM/MANAGER","DBSNMP/DBSNMP"],"c":"J","s":"","e":"DBSMTP/DBSMTP is not a real default Oracle account; SYS, SYSTEM, DBSNMP and SCOTT are."},{"id":550,"q":"Which of the following is NOT the default port number of a well-known database?","a":"1456","d":["3306","1521","1433","5432"],"c":"J","s":"","e":"1456 is not a well-known database port; 1433, 1521, 3306 and 5432 are."},{"id":551,"q":"You have created an image for a database server that you plan to deploy to five physical servers. At the last minute, management decides to deploy these as virtual servers. What additional security steps do you need to take with these virtual images before deploying them?","a":"None","d":["Install a virtual firewall","Reconfigure all database passwords","Change all default ports","Disable unused services"],"c":"J","s":"","e":"Cloning a hardened image to virtual servers needs no extra security step purely because it is virtual, the baseline hardening already lives in the image. (In practice you would still make sure each instance gets unique host keys/identifiers.)"},{"id":552,"q":"Which company originally came up with the concept of the 'Kill Chain'?","a":"Lockheed Martin","d":["IBM","Cisco","Microsoft","Symantec"],"c":"D","s":"","e":"Lockheed Martin originated the Cyber Kill Chain concept."},{"id":553,"q":"You are on penetration test, and are presented a KIOSK. Which tool will you use?","a":"iKAT","d":["Nmap","Metasploit","Burp Suite","Nikto"],"c":"I","s":"","e":"iKAT is the kiosk-breakout toolkit used to escape locked-down browser kiosk environments."},{"id":554,"q":"What form of antivirus scan looks at the beginning and end of executable files for known virus signatures?","a":"Signature scanning","d":["Heuristic scanning","Sandbox scanning","Behavioral scanning","Real-time scanning"],"c":"K","s":"","e":""},{"id":555,"q":"What type of virus scanning examines computer files for irregular or unusual instructions?","a":"Heuristic scanning","d":["Signature scanning","Behavioral scanning","Real-time scanning","Cloud-based scanning"],"c":"K","s":"","e":""},{"id":556,"q":"What is the difference between a worm and a virus?","a":"A worm is self-replicating but a virus isn't self-replicating","d":["A virus is self-replicating but a worm isn't","A worm requires human intervention to spread","A virus cannot cause damage while a worm can","A worm only affects network devices, not files"],"c":"K","s":"","e":""},{"id":557,"q":"What type of malware do users inadvertently install with USB thumb drives?","a":"Trojans","d":["Ransomware","Adware","Worms","Spyware"],"c":"K","s":"","e":""},{"id":558,"q":"Which of the following are NOT true about the Sasser worm?","a":"It only attacks hosts running MS-SQL server","d":["It exploited a Windows vulnerability","It spread through network shares","It could cause infected systems to crash","It affected both home and corporate users"],"c":"J","s":"","e":"Sasser spread through the Windows LSASS flaw, not MS-SQL, so 'only attacks MS-SQL' is false."},{"id":559,"q":"Which of the following describes programs that can run independently, travel from system to system, and disrupt computer communications?","a":"Worms","d":["Viruses","Trojans","Spyware","Adware"],"c":"K","s":"","e":""},{"id":560,"q":"Which of the following is a self-replicating computer program that sends copies of itself to other computers on a network without any user intervention?","a":"Worm","d":["Trojan","Virus","Adware","Spyware"],"c":"K","s":"","e":""},{"id":561,"q":"Which of the following malware exploits a cross-site scripting vulnerability and was developed to propagate across the MySpace social-networking site?","a":"Samy","d":["Code Red","ILOVEYOU","Melissa","Sasser"],"c":"I","s":"","e":"The Samy worm used a stored XSS flaw to self-propagate across MySpace."},{"id":562,"q":"Which of the following registry keys would malware add/modify to maintain persistence?","a":"HKLM\\Software\\Microsoft\\Windows\\CurrentVersion\\Run or HKLM\\Software\\Microsoft\\Windows\\CurrentVersion\\RunOnce","d":["HKLM\\System\\CurrentControlSet\\Services","HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer","HKLM\\Software\\Policies\\Microsoft\\Windows","HKCU\\Software\\Classes\\Local Settings\\Software\\Microsoft\\Windows"],"c":"K","s":"","e":""},{"id":563,"q":"Which of the following terms best describes malware?","a":"Threats","d":["Vulnerabilities","Patches","Exploits","Antiviruses"],"c":"K","s":"","e":""},{"id":564,"q":"Which of the following Trojans uses port 6666?","a":"Beast","d":["SubSeven","NetBus","Back Orifice","Poison Ivy"],"c":"K","s":"","e":""},{"id":565,"q":"You have become concerned that one of your workstations might be infected with a malicious program. Which of the following netstat switches would be the best to use?","a":"netstat -an","d":["netstat -e","netstat -s","netstat -p","netstat -r"],"c":"D","s":"","e":"netstat -an lists active connections and listening ports, useful for spotting malware beaconing."},{"id":566,"q":"What is the maximum number of characters in an SMS?","a":"160 7-bit characters","d":["140 8-bit characters","70 16-bit characters","180 characters","128 characters"],"c":"K","s":"","e":""},{"id":567,"q":"Where are personal files stored on an Apple IOS device?","a":"/private/var/mobile/Library/","d":["/home/user/Documents/","/Library/Application Support/","/var/root/Media/","/System/Library/"],"c":"F","s":"","e":"On an Apple iOS device, user files live under /private/var/mobile/Library/."},{"id":568,"q":"Which of the following is an exploit framework for Android?","a":"Drozer","d":["Metasploit","MobSF","Frida","Burp Suite"],"c":"K","s":"","e":""},{"id":569,"q":"Which of the following is NOT a Mobile OS?","a":"All of these options are a Mobile OS","d":["iOS","Android","Windows Phone","BlackBerry OS"],"c":"K","s":"","e":""},{"id":570,"q":"Which of the following tools allows communication with an emulated Android device?","a":"Adb","d":["Fastboot","Jadb","BlueStacks","Genymotion"],"c":"K","s":"","e":""},{"id":571,"q":"Because of findings discovered during a penetration test, you have been asked to investigate biometric authentication devices. Which of the following would represent the best system to install?","a":"A system with a low CER","d":["A system with a high FRR","A system with a high FAR","A system with a high throughput","A system with multi-factor authentication"],"c":"H","s":"","e":"Choose the device with the lowest Crossover Error Rate (CER), the best balance of false accepts and rejects."},{"id":572,"q":"During a physical assessment of an organization, you noticed that there is only an old dilapidated wood fence around the organization's R&D facility. As this building is a key asset, what height chain-link fence should you recommend be installed to deter a determined intruder?","a":"Eight foot","d":["Six foot","Four foot","Ten foot","Seven foot"],"c":"K","s":"","e":""},{"id":573,"q":"Locks are considered what type of control?","a":"Preventive","d":["Detective","Corrective","Compensatory","Deterrent"],"c":"K","s":"","e":""},{"id":574,"q":"Which kind of lock includes a keypad that can be used to control access into areas?","a":"Cipher","d":["Warded","Pin tumbler","Lever tumbler","Combination"],"c":"B","s":"","e":"A cipher lock uses a keypad/combination to control access into an area."},{"id":575,"q":"Which of the following is one of the primary ways that people can get past controlled doors?","a":"Piggybacking","d":["Phishing","Brute-forcing","Lock picking","Dumpster diving"],"c":"K","s":"","e":""},{"id":576,"q":"Which type of lock would be considered the easiest to pick?","a":"Warded","d":["Pin tumbler","Disk tumbler","Lever tumbler","Combination"],"c":"K","s":"","e":""},{"id":577,"q":"You were able to log on to a user's computer and plant a keystroke logger after you saw the user get up and walk away without logging out or turning off his computer. When preparing your final report, what should you recommend to the client as the best defence to prevent this from happening?","a":"Implementing screensaver passwords","d":["Installing antivirus software","Disabling USB ports","Using two-factor authentication","Installing a firewall"],"c":"H","s":"","e":"Screensaver/lock-on-idle passwords stop walk-up attacks on sessions left unattended."},{"id":578,"q":"You were successful in your dumpster diving raids against the target organization, and you uncovered sensitive information. In your final report, what is the best solution you can recommend to prevent this kind of attack?","a":"Shredders","d":["Locks on garbage bins","Encrypting documents","Using incinerators","Restricted access to waste areas"],"c":"K","s":"","e":""},{"id":579,"q":"What would be the result of the following port mathematics operation? (NB: In port mathematics, one should substitute the port number for each service, calculate the answer using standard base-10 arithmetic, then convert the answer back to a common TCP or UDP port name.) Netbios-ssn + ssh = ?","a":"SNMP","d":["Telnet","HTTP","FTP","LDAP"],"c":"D","s":"","e":"Applying port maths to the named services yields SNMP."},{"id":580,"q":"What would be the result of the following port mathematics operation? (NB: In port mathematics, one should substitute the port number for each service, calculate the answer using standard base-10 arithmetic, then convert the answer back to a common TCP or UDP port name.) Oracle-tns - Kerberos = ?","a":"MS-SQL-S","d":["MySQL","PostgreSQL","SMTP","POP3"],"c":"J","s":"","e":"Port maths: 1521 (Oracle-tns) minus 88 (Kerberos) equals 1433, which is MS-SQL-S."},{"id":581,"q":"What would be the result of the following port mathematics operation? (NB: In port mathematics, one should substitute the port number for each service, calculate the answer using standard base-10 arithmetic, then convert the answer back to a common TCP or UDP port name.) http / ftp-data + ftp = ?","a":"SMTP","d":["POP3","Telnet","DNS","IMAP"],"c":"F","s":"","e":"Applying port maths to the named services yields SMTP."},{"id":582,"q":"Which of the following best describes the principle of defence in-depth?","a":"Using a firewall as well as encryption to control and secure incoming network traffic","d":["Relying on a single antivirus solution","Implementing a VPN for remote access only","Using passwords alone for authentication","Setting up a single firewall for the network"],"c":"K","s":"","e":""},{"id":583,"q":"Out of the following which is NOT one of the items commonly accepted as a core security property?","a":"Authentication is a core security property, so it should not be listed as 'not commonly accepted.'","d":["Confidentiality","Integrity","Availability","Non-repudiation"],"c":"B","s":"","e":"The commonly accepted core security properties are confidentiality, integrity and availability (with authentication/non-repudiation often added)."},{"id":584,"q":"Which of the following pairs of organisations measure the risk of vulnerabilities?","a":"CVE, NIST","d":["ISO, ANSI","OSHA, CSA","FBI, INTERPOL","NATO, UN"],"c":"B","s":"","e":"CVE (MITRE) catalogues vulnerabilities and NIST/NVD scores their severity, so both measure vulnerability risk."},{"id":585,"q":"Attackers sent a targeted e-mail attack to the president of a company. What best describes this attack?","a":"Whaling","d":["Phishing","Spear phishing","Vishing","Pharming"],"c":"K","s":"","e":""},{"id":586,"q":"Of the following choices, what best represents an attack against specific employees of a company?","a":"Spear phishing","d":["Whaling","Phishing","Vishing","Tailgating"],"c":"K","s":"","e":""},{"id":587,"q":"Phishing differs from adware and spyware because?","a":"It uses social engineering and technical subterfuge whereas the other two do not","d":["It is always a browser-based attack","It never targets personal data","It does not rely on email as a delivery method","It cannot be prevented with antivirus software"],"c":"K","s":"","e":""},{"id":588,"q":"You recently used social engineering to talk your way into a secure facility. Which of the following should you recommend in your ethical hacking report as the best defence to prevent this from happening in the future?","a":"Guests are escorted","d":["Installing more security cameras","Using biometric access control","Implementing keycard access","Training employees to challenge unknown individuals"],"c":"K","s":"","e":""},{"id":589,"q":"ArcServe 5.11 is vulnerable to which of the following attacks?","a":"RPC calls not properly authenticating callers of methods on TCP port 6106 that may allow an attacker to modify the registry of a host leading to a complete compromise","d":["Buffer overflow on port 1234","Directory traversal on port 8080","SQL injection through web interface","Denial of Service on port 80"],"c":"B","s":"","e":"ArcServe 5.11 had an RPC flaw on TCP 6106 that failed to authenticate callers, allowing remote attack."},{"id":590,"q":"In which version of Adobe Reader did they introduce Sandboxing?","a":"10.1","d":["8.0","9.3","11.0","7.5"],"c":"E","s":"","e":"Adobe Reader introduced its Protected Mode sandbox in version 10 (the 10.1 release)."},{"id":591,"q":"RealVNC 4.1.1 is vulnerable to which of the following attacks?","a":"Specifying Type 1 authentication to disable authentication","d":["Buffer overflow on login","SQL injection","Cross-site scripting","Denial of Service"],"c":"I","s":"","e":"RealVNC 4.1.1 let a client select 'Type 1' (None) authentication, bypassing the password entirely."},{"id":592,"q":"What functionality did Windows x64 introduce, as a means of mitigating against SSDT rootkit exploits?","a":"Protected Processes","d":["Data Execution Prevention (DEP)","Address Space Layout Randomization (ASLR)","Driver Signature Enforcement","Kernel Patch Protection"],"c":"E","s":"","e":"Windows x64 added Kernel Patch Protection (PatchGuard) and Protected Processes to block SSDT-hooking rootkits."},{"id":593,"q":"What functionality does Adobe natively allow, that is vulnerable to being exploited?","a":"Running javascript","d":["Running ActiveX controls","Installing plugins","Executing VBScript","Embedding Flash objects"],"c":"G","s":"","e":"Adobe natively allows JavaScript to run inside PDFs, a feature frequently abused for exploitation."},{"id":594,"q":"A user plugged a cable into two RJ-45 wall jacks connected to unused ports on a switch. In a short period, this disrupted the overall network performance. What should you do to protect against this problem in the future?","a":"Enable loop protection on the switch","d":["Disable unused ports","Enable VLAN tagging","Configure port security","Use STP (Spanning Tree Protocol)"],"c":"D","s":"","e":"Plugging both ends into the switch creates a loop; loop protection (BPDU Guard/STP) prevents the resulting broadcast storm."},{"id":595,"q":"In an attack simulation, you manage to connect your laptop to a switch that enforces Network Access Control (NAC). Which of the following is the LEAST LIKELY to happen?","a":"The port becomes disabled","d":["You are granted limited network access","You are redirected to a quarantine VLAN","You are required to authenticate","The switch logs your connection attempt"],"c":"D","s":"","e":"On a NAC-enforced switch, an unauthorised device causes the port to be disabled."},{"id":596,"q":"What is SS7?","a":"A signaling protocol for telephony networks","d":["A satellite communication protocol","A security protocol for wireless networks","An encryption algorithm","A DNS query protocol"],"c":"D","s":"","e":"SS7 is the Signalling System 7 protocol suite used in telephony networks."},{"id":597,"q":"Which of the following best describes a phreaker?","a":"A hacker who is skilled in manipulating the phone system","d":["A person who specializes in social engineering","An expert in exploiting wireless networks","A hacker focused on financial fraud","A cybersecurity professional specializing in malware"],"c":"K","s":"","e":""},{"id":598,"q":"A process running on a system has system-level access to the operating system kernel. Investigation shows that it has modified system files. What best describes this behavior?","a":"Rootkit","d":["Trojan","Adware","Spyware","Worm"],"c":"K","s":"","e":""},{"id":599,"q":"An organisation wants to ensure that it does not use compromised certificates. What should it check?","a":"CRL","d":["CA","SHA","AES","RSA"],"c":"B","s":"","e":"Checking the Certificate Revocation List (CRL) ensures a certificate has not been revoked or compromised."},{"id":600,"q":"During a penetration test, you found several systems connected to the Internet that have a low security level, which allows for the free recording of cookies. This creates a risk because cookies locally store which of the following?","a":"Information about the user","d":["Firewall rules","System passwords","Encryption keys","Network configurations"],"c":"B","s":"","e":"Low-security Internet-facing systems often leak information about the user, useful for further attacks."},{"id":601,"q":"In the mobile alphabet (ITU E 1.161) how would you type 'elite'?","a":"35483","d":["34583","31485","35438","35843"],"c":"K","s":"","e":""},{"id":602,"q":"Rosa would like to make sure that the digital photos and art she produces are recognizable in case her work is stolen and placed on another website. What should she do?","a":"Digital watermark","d":["Use a public key","Apply a checksum","Use a CAPTCHA","Apply an SSL certificate"],"c":"B","s":"","e":"A digital watermark embeds ownership information into images or art so they remain identifiable if copied."},{"id":603,"q":"The art of hiding information in graphics or music files is known as which of the following?","a":"Steganography","d":["Cryptography","Encoding","Hashing","Watermarking"],"c":"B","s":"","e":"Hiding information inside images or audio files is steganography."},{"id":604,"q":"What does a Firewire Port allow you to perform against an OS?","a":"All of the above","d":["Data transfer","Direct memory access","Device control","Firmware updates"],"c":"K","s":"","e":""},{"id":605,"q":"What is an any-cast address?","a":"A group of addresses where packets are delivered to only one member within the any-cast group","d":["A single address used by multiple devices","A multicast address for a single device","A broadcast address for a specific subnet","An IPv6 loopback address"],"c":"B","s":"","e":"An anycast address is shared by many hosts; a packet is delivered to only the nearest single member of the group."},{"id":606,"q":"What is an OLE exploit?","a":"A Malicious DLL","d":["A phishing attack","A buffer overflow","A ransomware payload","An SQL injection"],"c":"K","s":"","e":""},{"id":607,"q":"What is SCTP?","a":"A protocol encapsulated by IP","d":["A type of firewall","A data encryption standard","A hashing algorithm","A wireless communication protocol"],"c":"B","s":"","e":"SCTP is a transport protocol encapsulated by IP, message-oriented with multihoming, alongside TCP and UDP."},{"id":608,"q":"What is the correct MTU for a PPPoE network device?","a":"1492","d":["1500","1480","1450","1400"],"c":"B","s":"","e":"PPPoE links use an MTU of 1492 (1500 minus the 8-byte PPPoE header)."},{"id":609,"q":"What type of attack starts on a virtual system but can affect the physical host?","a":"VM escape","d":["Rootkit attack","Phishing attack","Ransomware attack","SQL injection"],"c":"K","s":"","e":""},{"id":610,"q":"What will protect against a SYN attack?","a":"Flood guard","d":["Anti-virus software","Firewalls","Encryption","Password policies"],"c":"B","s":"","e":"A flood guard (e.g. SYN cookies or rate limits) protects against SYN flood attacks."},{"id":611,"q":"What's the IMAP (Internet Message Access Protocol) protocol used for?","a":"Storing and retrieving emails","d":["Sending emails","Encrypting emails","Filtering spam","Archiving emails"],"c":"F","s":"","e":"IMAP stores and retrieves email on the server, unlike POP3 which typically downloads and deletes it."},{"id":612,"q":"Which of the following can be used to ensure a sender’s authenticity and an email’s confidentiality?","a":"By first encrypting the hash of the message with the sender's private key and then encrypting the message with the receiver's public key","d":["Using SSL only","Sending via VPN","Encrypting with DES","Applying an MD5 hash"],"c":"B","s":"","e":"Sign the message hash with your private key for authenticity, then encrypt with the recipient's key for confidentiality."},{"id":613,"q":"Which of the following defines the acronym CVE, as in cve.mitre.org?","a":"Common Vulnerabilities and Exposures","d":["Central Vulnerability Endpoint","Cybersecurity Vulnerability Events","Computer Virus Engine","Common Validation Errors"],"c":"B","s":"","e":"CVE stands for Common Vulnerabilities and Exposures."},{"id":614,"q":"Which of the following is the dialing sequence to enable a GSM modem?","a":"*99***1#","d":["*98#","*97*#","*123#","*101*1#"],"c":"K","s":"","e":""},{"id":615,"q":"Which of the following is used to verify the proof of identity?","a":"Non-repudiation","d":["Encryption","Hashing","Anonymity","Confidentiality"],"c":"B","s":"","e":"Non-repudiation verifies proof of identity/origin so a sender cannot later deny their action."},{"id":616,"q":"Which one of the following AAA protocols uses multiple challenges and responses?","a":"TACACS +","d":["RADIUS","Kerberos","LDAP","PAP"],"c":"D","s":"","e":"TACACS+ uses multiple challenge/response exchanges and separates authentication, authorisation and accounting."},{"id":617,"q":"Which one of the following is the default NXP Mifare A Key?","a":"There is no default NXP Mifare A Key. The default value of both Key A and Key B in the Mifare Classic system is usually set to FF FF FF FF FF FF, but this is not a secure key to use for authentication.","d":["0123456789ABCDEF","0000000000000000","FFFFFFFFFFFFFFFF","1A2B3C4D5E6F7G8H"],"c":"K","s":"","e":""},{"id":618,"q":"Why is EIP important?","a":"It points to the next instruction on the stack","d":["It stores encryption keys","It defines the IP address","It manages process scheduling","It tracks network packets"],"c":"B","s":"","e":"EIP (the instruction pointer) holds the address of the next instruction; overwriting it in a buffer overflow hands the attacker control of execution."},{"id":619,"q":"You are on a penetration test, and are given an ERP environment, which tool will be the most use?","a":"Bizploit","d":["Metasploit","Nmap","Wireshark","Burp Suite"],"c":"I","s":"","e":"Bizploit is the ERP/SAP penetration-testing framework."},{"id":620,"q":"Your organization is considering deploying multiple servers using a standardized image. Of the following choices, what best describes the security benefit of this plan?","a":"The image can include mandated security configurations","d":["It reduces network latency","Increases disk space availability","Provides faster data backup","Simplifies licensing compliance"],"c":"E","s":"","e":"A standardised image lets you bake mandated security configurations into every server consistently."},{"id":621,"q":"You're planning on planting a sniffing program on a Linux system but are worried that it will be discovered when someone runs an ifconfig -a. Which of the following is your best option for hiding the tool?","a":"Replace the original version of ifconfig with a rootkit version","d":["Rename the sniffing program","Encrypt the sniffing program","Install a firewall to block detection","Change file permissions"],"c":"B","s":"","e":"Replacing ifconfig with a rootkit version hides the sniffer's promiscuous-mode interface from detection."},{"id":622,"q":"Clickjacking is a term first introduced by Jeremiah Grossman and Robert Hansen in 2008 to describe which of the following?","a":"A technique whereby an attacker takes control of the user's mouse clicks and movement via a compromised website","d":["A method of redirecting users to phishing websites","A technique for bypassing two-factor authentication","An attack to steal cookies from the browser","A method of encrypting web traffic"],"c":"H","s":"","e":"Clickjacking tricks users into clicking hidden or overlaid controls via a malicious framing site."},{"id":623,"q":"Which of the following is a valid RIR (Regional Internet Registry)?","a":"LACNIC","d":["APINC","AFRINIC","IAR","ISNIC"],"c":"E","s":"","e":"LACNIC is a valid Regional Internet Registry, covering Latin America and the Caribbean."},{"id":624,"q":"Which threat is your web application susceptible to if a user can pass specially crafted input that invokes semantic control codes?","a":"Injection","d":["Cross-Site Scripting","Phishing","Denial of Service","Clickjacking"],"c":"I","s":"","e":"Input containing control codes that change how it is interpreted is the basis of injection attacks."},{"id":625,"q":"Which one of these is NOT part of the OWASP top ten Web App Vulnerabilities?","a":"Use of Obsolete Cryptographic Ciphers","d":["Injection","Broken Authentication","Cross-Site Scripting (XSS)","Sensitive Data Exposure"],"c":"I","s":"","e":"'Use of obsolete cryptographic ciphers' is not one of the named OWASP Top Ten categories."},{"id":626,"q":"Which of the following is NOT a supported search parameter for use in 'Google Hacking'?","a":"infile:","d":["intitle:","inurl:","filetype:","site:"],"c":"C","s":"","e":"infile: is not a real Google operator; intitle, inurl, filetype and site are."},{"id":627,"q":"What does the abbreviation 'NNTP' stand for?","a":"Network News Transfer Protocol","d":["Network Node Transfer Protocol","New Node Transfer Protocol","Next Network Transfer Protocol","Net News Transmission Protocol"],"c":"C","s":"","e":"NNTP stands for Network News Transfer Protocol, used to move Usenet news articles."},{"id":628,"q":"Which of these is a valid Email header field?","a":"Return-Path","d":["From-Name","Email-Host","Sender-Info","Reply-Address"],"c":"C","s":"","e":"Return-Path is a valid email header (it holds the bounce/return address)."},{"id":629,"q":"The active-status of which three ports indicate the use of IPSec on a network?","a":"50, 51, 500","d":["80, 443, 8080","21, 22, 23","110, 143, 993","161, 162, 514"],"c":"D","s":"","e":"IPsec is indicated by UDP 500 (IKE) plus IP protocols 50 (ESP) and 51 (AH)."},{"id":630,"q":"Which of the following is NOT a valid SIP request method?","a":"CLOSE","d":["INVITE","REGISTER","ACK","BYE"],"c":"D","s":"","e":"CLOSE is not a valid SIP method; BYE ends a session."},{"id":631,"q":"Which of the following is NOT a recognised Windows Patch Management Strategy?","a":"Windows Update Deployment Service","d":["WSUS (Windows Server Update Services)","SCCM (System Center Configuration Manager)","Group Policy Patching","Third-Party Patching Tools"],"c":"E","s":"","e":"There is no Windows Update Deployment Service; the real patch strategies are SMS, SUS, WSUS and MBSA."},{"id":632,"q":"Running services on non-default ports is based on which one of these principles?","a":"Security through obscurity","d":["Principle of least privilege","Defense in depth","Layered security","Zero trust architecture"],"c":"B","s":"","e":"Running services on non-default ports is security through obscurity, it hides but does not actually secure them."},{"id":633,"q":"X11, or the X Window System version 11, was developed at which well-known technology organisation?","a":"Massachusetts Institute of Technology (MIT)","d":["Stanford University","Carnegie Mellon University","Harvard University","University of California, Berkeley"],"c":"F","s":"","e":"The X Window System (X11) was developed at MIT."},{"id":634,"q":"Which of the following organisations hosts the CVE (Common Vulnerabilities and Exposures) database?","a":"Mitre","d":["NIST","CERT","OWASP","ISO"],"c":"H","s":"","e":"MITRE hosts and maintains the CVE (Common Vulnerabilities and Exposures) database."},{"id":635,"q":"The long-awaited HTML5 introduced which of the following new tags?","a":"<footer>","d":["<blink>","<center>","<applet>","<strike>"],"c":"G","s":"","e":"HTML5 introduced semantic tags such as <footer> (along with <header>, <nav> and <article>)."},{"id":636,"q":"Which of the following is not a commonly-used web server?","a":"FreeBSD","d":["Apache","Nginx","IIS","Tomcat"],"c":"G","s":"","e":"FreeBSD is an operating system, not a web server; Apache, IIS and nginx are web servers."},{"id":637,"q":"Which statement regarding a pentest report is true?","a":"The technical details will be read by the IT/Information security people responsible.","d":["The pentest report should not contain recommendations.","The pentest report is only for the company's management.","It should always be written in non-technical language.","It must be kept confidential from the client."],"c":"A","s":"","e":"The technical detail section is read by the IT and security staff responsible for remediation."},{"id":638,"q":"What is Egress filtering (in terms of a network)?","a":"The practice of monitoring or potentially blocking outgoing traffic to IP addresses that are not permitted to be accessed.","d":["Filtering inbound emails","Blocking incoming traffic to specific ports","Monitoring DNS requests","Encrypting internal network traffic"],"c":"B","s":"","e":"Egress filtering monitors or blocks outbound traffic, limiting data exfiltration and C2 callbacks."},{"id":639,"q":"Which Nmap command can allow you to perform an 'Idle Zombie Scan' and what is the effect?","a":"Command: 'nmap -sI [zombie ip][target ip]'. This results in the firewall logs recording the IP addresses of only the zombie addresses.","d":["nmap -sP - scans multiple IPs for active devices","nmap -sS - performs a SYN scan","nmap -A - performs OS and version detection","nmap -sU - scans for open UDP ports"],"c":"B","s":"","e":"nmap -sI [zombie] [target] runs an idle scan,
