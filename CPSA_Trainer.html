<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPSA Trainer</title>
<style>
:root{
  --bg:#0f1419; --bg2:#161c24; --card:#1b232e; --card2:#212c39; --line:#2c3845;
  --tx:#e6edf3; --tx2:#9fb0c0; --tx3:#6b7d8f;
  --ac:#4ea1ff; --ac2:#2b6fc2;
  --ok:#3fb950; --okbg:#10331a; --bad:#f85149; --badbg:#3a1416; --warn:#d29922;
  --r:12px; --sh:0 2px 10px rgba(0,0,0,.3);
}
@media (prefers-color-scheme: light){
  :root{ --bg:#f3f6fa; --bg2:#fff; --card:#fff; --card2:#f5f8fc; --line:#dde5ee;
    --tx:#1a2330; --tx2:#52637a; --tx3:#8595a8; --ac:#1f6feb; --ac2:#1456c0;
    --ok:#1a7f37; --okbg:#dcffe4; --bad:#cf222e; --badbg:#ffebe9; --warn:#9a6700; --sh:0 1px 6px rgba(20,40,70,.08);}
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--ac);text-decoration:none}
.wrap{max-width:880px;margin:0 auto;padding:0 18px 80px}
header{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--line);box-shadow:var(--sh)}
.hb{max-width:880px;margin:0 auto;padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand{font-weight:800;letter-spacing:.3px;font-size:18px;cursor:pointer;display:flex;align-items:center;gap:8px}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
nav{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
nav button{background:transparent;border:1px solid transparent;color:var(--tx2);padding:6px 12px;border-radius:8px;
  cursor:pointer;font-size:14px;font-weight:600;font-family:inherit}
nav button:hover{color:var(--tx);background:var(--card)}
nav button.on{color:#fff;background:var(--ac);border-color:var(--ac)}
@media (prefers-color-scheme: light){nav button.on{color:#fff}}
h1{font-size:26px;margin:24px 0 4px}
h2{font-size:19px;margin:26px 0 12px}
.sub{color:var(--tx2);margin:0 0 18px}
.grid{display:grid;gap:14px}
.cards{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.card.click{cursor:pointer;transition:.12s}
.card.click:hover{border-color:var(--ac);transform:translateY(-2px)}
.kpi{font-size:30px;font-weight:800;line-height:1.1}
.kpi small{font-size:14px;color:var(--tx2);font-weight:600}
.lbl{color:var(--tx2);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.btn{background:var(--ac);color:#fff;border:none;padding:12px 20px;border-radius:10px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:inherit}
.btn:hover{background:var(--ac2)}
.btn.lg{padding:15px 26px;font-size:16px;width:100%}
.btn.gh{background:transparent;border:1px solid var(--line);color:var(--tx)}
.btn.gh:hover{border-color:var(--ac);color:var(--ac)}
.btn.sm{padding:8px 14px;font-size:13px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;background:var(--card2);color:var(--tx2);border:1px solid var(--line)}
.bar{height:9px;border-radius:6px;background:var(--card2);overflow:hidden;border:1px solid var(--line)}
.bar i{display:block;height:100%;border-radius:6px}
.muted{color:var(--tx2)}
.small{font-size:13px}
.tlist{display:grid;gap:10px}
.trow{display:grid;grid-template-columns:1fr auto;gap:6px 14px;align-items:center;background:var(--card);border:1px solid var(--line);
  border-radius:10px;padding:12px 14px;cursor:pointer;transition:.12s}
.trow:hover{border-color:var(--ac)}
.trow .tn{font-weight:700}
.trow .tmeta{font-size:12px;color:var(--tx2)}
.trow .pct{font-weight:800;font-size:16px;min-width:48px;text-align:right}
.trow .barwrap{grid-column:1/3}
.q-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:10px 0 6px;flex-wrap:wrap}
.q-prog{font-size:13px;color:var(--tx2);font-weight:600}
.timer{font-variant-numeric:tabular-nums;font-weight:800;font-size:18px;padding:4px 12px;border-radius:8px;background:var(--card);border:1px solid var(--line)}
.timer.warn{color:var(--warn);border-color:var(--warn)}
.timer.danger{color:var(--bad);border-color:var(--bad)}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--sh)}
.qtext{font-size:18px;line-height:1.55;white-space:pre-wrap;word-break:break-word;margin:6px 0 18px;font-weight:600}
.opts{display:grid;gap:10px}
.opt{display:flex;gap:12px;align-items:flex-start;text-align:left;background:var(--card2);border:1.5px solid var(--line);
  border-radius:10px;padding:13px 15px;cursor:pointer;font-family:inherit;font-size:15.5px;color:var(--tx);transition:.1s;width:100%;white-space:pre-wrap;word-break:break-word}
.opt:hover{border-color:var(--ac)}
.opt .key{flex:0 0 26px;height:26px;border-radius:6px;background:var(--bg2);border:1px solid var(--line);display:flex;
  align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--tx2)}
.opt.sel{border-color:var(--ac);background:rgba(78,161,255,.10)}
.opt.sel .key{background:var(--ac);color:#fff;border-color:var(--ac)}
.opt.correct{border-color:var(--ok);background:var(--okbg)}
.opt.correct .key{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt.wrong{border-color:var(--bad);background:var(--badbg)}
.opt.wrong .key{background:var(--bad);color:#fff;border-color:var(--bad)}
.opt.lock{cursor:default}
.expl{margin-top:16px;padding:14px 16px;border-radius:10px;border-left:3px solid var(--ac);background:var(--card2);font-size:14.5px}
.expl .et{font-weight:800;color:var(--ac);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.qbar{display:flex;justify-content:space-between;gap:10px;margin-top:18px;flex-wrap:wrap}
.fb{font-weight:800;font-size:15px}
.fb.ok{color:var(--ok)} .fb.bad{color:var(--bad)}
.palette{display:grid;grid-template-columns:repeat(auto-fill,minmax(34px,1fr));gap:6px;margin-top:14px}
.pn{aspect-ratio:1;border-radius:7px;border:1px solid var(--line);background:var(--card2);color:var(--tx2);font-weight:700;
  font-size:12px;cursor:pointer;font-family:inherit}
.pn.ans{background:var(--ac2);color:#fff;border-color:var(--ac2)}
.pn.cur{outline:2px solid var(--ac);outline-offset:1px}
.pn.flag{background:var(--warn);color:#1a2330;border-color:var(--warn)}
.flash{min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;padding:30px}
.flash .ft{font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:12px}
.flash .fq{font-size:19px;font-weight:700;white-space:pre-wrap}
.flash .fa{font-size:17px;color:var(--ok);font-weight:700;white-space:pre-wrap}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{background:var(--card);border:none;color:var(--tx2);padding:8px 14px;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit}
.seg button.on{background:var(--ac);color:#fff}
.banner{padding:14px 16px;border-radius:10px;background:var(--card2);border:1px solid var(--line);margin:10px 0}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:10px 18px;
  border-radius:10px;font-weight:700;font-size:14px;box-shadow:var(--sh);opacity:0;transition:.2s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.kbd{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;background:var(--card2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--tx2)}
.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:620px){.split{grid-template-columns:1fr}.qtext{font-size:16.5px}}
hr.sep{border:none;border-top:1px solid var(--line);margin:22px 0}
.ring{--p:0;width:118px;height:118px;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--ac) calc(var(--p)*1%), var(--card2) 0);}
.ring .in{width:90px;height:90px;border-radius:50%;background:var(--card);display:grid;place-items:center;text-align:center}
.foot{color:var(--tx3);font-size:12px;text-align:center;margin-top:30px}
</style>
</head>
<body>
<header>
  <div class="hb">
    <div class="brand" onclick="go('home')"><span class="dot"></span>CPSA&nbsp;Trainer</div>
    <nav id="nav"></nav>
  </div>
</header>
<div class="wrap"><main id="app"></main>
  <div class="foot">Offline study tool · progress saved in this browser · aligned to CREST CPSA syllabus v2.5</div>
</div>
<div class="toast" id="toast"></div>
<script>
const BANK = [{"id":0,"q":"Why can remote access VPNs not use Main Mode for IKE Phase-1 if the authentication method is pre-shared key?","a":"Because pre-shared key authentication with Main Mode requires that the peer's IP is known before the connection is established.","d":["Because remote access servers always use aggressive mode for IKE Phase-1.","Because XAUTH is not compatible with IKE Main Mode.","Because IKE Main Mode does not support the pre-shared key authentication method.","Because remote access clients always use aggressive mode for IKE Phase-1."],"c":"D","s":"","e":"With a pre-shared key, Main Mode needs the peer's IP known in advance to look up the key; remote-access clients have dynamic IPs, so Aggressive Mode is used instead."},{"id":1,"q":"What is the blocksize of the DES encryption cipher?","a":"64 bits","d":["40 bits","128 bits","56 bits","112 bits"],"c":"B","s":"","e":"DES uses a 64-bit block size; its key is 56 effective bits."},{"id":2,"q":"What is this: 16:23:57.094021 IP 192.168.124.204.137 > 192.168.124.255.137: NBT UDP PACKET(137): QUERY; REQUEST; BROADCAST","a":"A NetBIOS over TCP/IP name service broadcast","d":["A Spanning Tree Protocol broadcast","An ARP broadcast","A NetBIOS over TCP/IP session service broadcast","A CDP broadcast"],"c":"D","s":"","e":"A UDP packet to/from port 137 at the broadcast address is a NetBIOS over TCP/IP name-service broadcast."},{"id":3,"q":"Which is the least secure encryption cipher of those listed below?","a":"DES","d":["Triple-DES","MD5","AES","IDEA"],"c":"B","s":"","e":"DES is the least secure here, as its 56-bit key is brute-forceable, unlike 3DES or AES."},{"id":4,"q":"Which file in a user's home directory controls the trust relationships for Berkeley R services?","a":".rhosts","d":["hosts.equiv","rhosts","rhosts.allow","hosts.allow"],"c":"F","s":"","e":".rhosts in a user's home directory defines trusted hosts and users for the Berkeley r-services, easily abused if misconfigured."},{"id":5,"q":"Which operating system is most likely to be vulnerable to the TTYPROMPT vulnerability in the telnet service?","a":"Solaris 8","d":["Solaris 9","Linux","Solaris 10","FreeBSD"],"c":"F","s":"","e":"Solaris 8's telnet daemon was vulnerable to the TTYPROMPT environment-variable bug."},{"id":6,"q":"Which of the following algorithms could be used to negotiate a shared encryption key?","a":"Diffie-Hellman","d":["Triple-DES","SHA1","DES","AES"],"c":"B","s":"","e":"Diffie-Hellman lets two parties negotiate a shared encryption key over an insecure channel."},{"id":7,"q":"Why might a tester insert the string \"alert(\"it works\")\" into a web form?","a":"To check for a Cross-Site Scripting vulnerability.","d":["To check for a session fixation vulnerability.","To check for a SQL Injection vulnerability.","To check for a blind SQL Injection vulnerability.","To check that the form submission works correctly."],"c":"I","s":"","e":"alert('it works') is a harmless probe; if the box pops, the app reflected your script unsanitised and is vulnerable to XSS."},{"id":8,"q":"Which protocols are associated with PPTP?","a":"TCP port 1723 and IP protocol 47","d":["IP protocol 89","IP protocol 94","TCP port 443","UDP port 500, IP protocol 50 and IP protocol 51"],"c":"B","s":"","e":"PPTP uses TCP 1723 for control and IP protocol 47 (GRE) for the tunnel."},{"id":9,"q":"Where are the encrypted passwords stored on a Solaris system?","a":"/etc/shadow","d":["In the TPM chip","/etc/passwd","/etc/master.passwd","/etc/group"],"c":"F","s":"","e":"Solaris stores hashed passwords in /etc/shadow, which is readable only by root."},{"id":10,"q":"Which of the following statements about the rwho protocol is true?","a":"The rwho daemon sends regular broadcasts to UDP port 513, and listens to broadcasts from other systems.","d":["rwho clients can query the rwho daemon. The protocol uses ONC/RPC.","rwho clients can query the rwho daemon using UDP port 513.","rwho clients can query the rwho daemon using TCP port 513.","The rwho daemon sends regular broadcasts to TCP port 513, and listens to broadcasts from other systems."],"c":"B","s":"","e":"The rwho daemon broadcasts to UDP 513 and listens for others, leaking which users are logged in."},{"id":11,"q":"How would you establish a null session to a windows host from a windows command shell?","a":"NET USE \\\\hostname\\ipc$ \"\" /u:\"\"","d":["NET USE \\\\hostname\\c$ \"\" /u:NULL","NET USE \\\\hostname\\c$ \"\" /u:\"\"","NET USE \\\\hostname\\ipc$ \"\" /u:NULL","NET USE \\\\hostname\\ipc$ NULL /u:NULL"],"c":"E","s":"","e":"Connecting to the IPC$ share with an empty username and password opens a null (anonymous) SMB session, used to enumerate users and shares."},{"id":12,"q":"If the account lockout threshold is set to 5, how many incorrect password attempts will cause the built in administrator account to be locked out on a Windows 2003 system?","a":"The built in administrator account will never be locked out.","d":["one attempt","six attempts","It depends on the account lockout duration setting","five attempts"],"c":"E","s":"","e":"The built-in Administrator (RID 500) is exempt from account lockout, so it can be brute-forced indefinitely unless renamed and hardened."},{"id":13,"q":"What effect would an octal umask of 0027 have on the permissions of new files?","a":"Remove group write access, and remove all permissions for others.","d":["Add SUID, SGID and Sticky bits, add all owner permissions, and add read and execute group access.","It has no effect on new files because it only affects existing files.","Add group write access, and add all permissions for others.","Remove SUID, SGID and Sticky bits, remove all owner permissions, and remove read and execute group access."],"c":"F","s":"","e":"A umask of 0027 strips group write and all 'other' permissions from newly created files."},{"id":14,"q":"What is the name given to the field concerned with the security implications of electronic eminations from communications equipment?","a":"TEMPEST","d":["CYCLONE","TYPHOON","HURRICANE","STORM"],"c":"B","s":"","e":"TEMPEST is the field concerned with information leakage through electromagnetic emanations (and shielding against it)."},{"id":15,"q":"Which of these is not a valid IPv6 address?","a":"2001:0db8:1428:57ab","d":["2001:db8::1428:57ab","2001:0db8:0:0:0:0:1428:57ab","2001:0db8:0000:0000:0000:0000:1428:57ab","2001:0db8:0:0::1428:57ab"],"c":"B","s":"","e":"2001:0db8:1428:57ab is too short to be a valid IPv6 address, which needs eight 16-bit groups."},{"id":16,"q":"You discover an Internet accessible anonymous FTP server on a client's internal network, which is vulnerable to the FTP bounce attack. What is the impact of this vulnerability?","a":"Attackers could exploit the vulnerability to port scan other systems on the client's internal network.","d":["Attackers could exploit the vulnerability to access any file on the FTP server.","Attackers could exploit the vulnerability to upload files to the FTP server.","Attackers could exploit the vulnerability to intercept network traffic on the client's internal network.","Attackers could exploit the vulnerability to gain administrative access to the FTP server."],"c":"F","s":"","e":"An FTP server vulnerable to the FTP bounce attack can be made to port-scan other internal hosts via the PORT command."},{"id":17,"q":"What would you expect the command \"finger 0@hostname\" (that is a zero) against a Solaris 8 system to display?","a":"Users with an empty GCOS field in the password file.","d":["Users with an empty home directory field in the password file.","Users with UID 0 in the password file.","Users with an empty shell field in the password file.","Users with an empty password field in the password file."],"c":"F","s":"","e":"finger 0@host (a zero) on Solaris lists accounts that have an empty GCOS field in the password file."},{"id":18,"q":"What are the four potential risk treatments?","a":"Avoid, Reduce, Accept and Transfer.","d":["Treat, Ignore, Downplay and Optimise.","Physical, Environmental, Technical and Managerial.","Best Practice,Standards Based, Regulation and Compliance.","Theoretical, Practical, Logical and Virtual."],"c":"A","s":"","e":"The four risk treatments are Avoid, Reduce (mitigate), Accept, and Transfer (e.g. insurance)."},{"id":19,"q":"What does \"export\" signify for an SSL cipher","a":"It is a weak cipher that was acceptable for export under the old US cryptography export regulations","d":["It is the strongest cipher that is currently permitted to be exported from the US","It is a cipher with integrated key escrow, which allows the NSA to recover the key","It is a cipher that is suitable for encrypting information to be sent across national borders","It is a stronger version of a cipher, similar to export versions of European lagers"],"c":"B","s":"","e":"An 'export' SSL cipher is deliberately weak, permitted under old US crypto export rules, and should be rejected."},{"id":20,"q":"Which of these protocols is not vulnerable to address spoofing if implemented correctly?","a":"TCP","d":["UDP","IP","Ethernet","SMTP"],"c":"B","s":"","e":"Correctly implemented TCP resists blind spoofing thanks to its sequence numbers and handshake."},{"id":21,"q":"What effect does setting the RestrictAnonymous registry setting to 1 have on a Windows NT or 2000 system?","a":"It prevents enumeration of SAM accounts and names.","d":["It remove the \"everyone\" group from the access token for non-authenticated users, preventing most access from null sessions.","It does not have any effect, because 1 is not a valid setting on NT and 2000.","It does not have any effect, because 1 is the default setting on NT and 2000.","It prevents RID cycling."],"c":"E","s":"","e":"RestrictAnonymous=1 blocks anonymous enumeration of SAM account names over a null session."},{"id":22,"q":"What command would you use to list the installed packages on a Solaris system?","a":"pkginfo","d":["rpm -qa","cat /proc/sys/packages","pkg_info","dpkg -l"],"c":"F","s":"","e":"pkginfo lists the installed software packages on a Solaris system."},{"id":23,"q":"Which protocols and ports are used by Telnet, SMTP and Finger?","a":"TCP/23, TCP/25 and TCP/79","d":["UDP/23, UDP/25 and UDP/79","TCP/23, TCP/35 and TCP/69","TCP/23, TCP/25 and TCP/69","TCP/22, TCP/25 and TCP/79"],"c":"B","s":"","e":"Telnet, SMTP and Finger use TCP 23, 25 and 79 respectively."},{"id":24,"q":"What would an SNMP request to set OID 1.3.6.1.4.1.9.2.1.55.10.0.0.1 to \"file\" on a Cisco router using a community string with read/write access do?","a":"Cause the target router to upload its configuration file to the TFTP server at 10.0.0.1 as a file called \"file\"","d":["Cause the router at IP address 10.0.0.1 to display its configuration file","Cause the target router to load its configuration file from NVRAM","Cause the target router to download the configuration file from the TFTP server at 10.0.0.1 from a file called \"file\"","Cause the target router to write its configuration file to NVRAM"],"c":"D","s":"","e":"Writing 'file' to that Cisco OID via SNMP makes the router TFTP-upload its configuration to 10.0.0.1, a classic SNMP write-string attack."},{"id":25,"q":"What RPC authentication mechanism does NFS v2 and v3 use?","a":"AUTH_SYS, using Unix UID and GID","d":["Kerberos","AUTH_NONE, no authentication","RPCSEC_GSS, Generic security services","AUTH_DH, Diffie-Hellman authentication"],"c":"F","s":"","e":"NFSv2/v3 use AUTH_SYS, trusting the client-supplied UID and GID, which an attacker can simply spoof."},{"id":26,"q":"Which of these statements about the Windows built in administrator account is correct?","a":"It always has RID 500","d":["It is always named \"Administrator\"","It is the only member of the \"Administrators\" group","It cannot be renamed","It always has SID 500"],"c":"E","s":"","e":"The built-in Administrator always has RID 500, which identifies it even if the account is renamed."},{"id":27,"q":"What does the \"Root Squash\" option on an NFS export do?","a":"Makes the root user on the NFS client access files as nobody on the server.","d":["Makes all users on the NFS client access files as root on the server.","Prevents any access by the root user on the NFS client.","Allows the root user on the NFS client to access files as root on the server.","Prevents the use of SUID files that are owned by root on the NFS server."],"c":"F","s":"","e":"root_squash maps a remote root user to nobody on the server, limiting what remote root can access."},{"id":28,"q":"With blind SQL injection, the results of the injection are not visible, and no errors are displayed. How can blind SQL injection be detected?","a":"The web server behaviour changes when a successful injection is performed.","d":["By sniffing the packets travelling between the browser and the web server.","The results are encoded in the HTTP headers returned by the server.","The attacker can only detect blind SQL injection by gaining physical access to the web server.","By observing the HTTP response code sent by the server."],"c":"G","s":"","e":"Blind SQL injection is detected by changes in the application's behaviour (true/false responses or timing), since no data or error is returned."},{"id":29,"q":"What does the phrase \"Inherent Risk\" mean in risk management?","a":"A risk that is implicitly associated with an activity or location.","d":["A risk that doesn't really matter.","A risk that no one knows what to do about.","A material misstatement relating to an assertion.","A very serious risk."],"c":"A","s":"","e":"Inherent risk is the risk built into an activity or location before any controls are applied."},{"id":30,"q":"Which of the following cipher modes use a block cipher to generate a key stream that can be used as a stream cipher?","a":"CFB","d":["ECB","CBC","EDE","ABC"],"c":"B","s":"","e":"CFB (Cipher Feedback) turns a block cipher into a self-synchronising stream cipher via feedback."},{"id":31,"q":"What is the digest length for the SHA1 hash function?","a":"160 bits","d":["192 bits","128 bits","56 bits","256 bits"],"c":"B","s":"","e":"SHA-1 produces a 160-bit digest (40 hex characters)."},{"id":32,"q":"What is the default password for the DBSNMP user on Oracle 9i?","a":"DBSNMP","d":["blank","MANAGER","SYSADM","CHANGE_ON_INSTALL"],"c":"J","s":"","e":"Oracle's DBSNMP account ships with the default password DBSNMP, a classic default-credential check."},{"id":33,"q":"Which of these groups of tools are commonly used for packet crafting?","a":"hping2, hping3 and scapy","d":["wireshark, tcpdump and dsniff","john, cain & able and l0phtcrack","nmap, superscan and angry IP scanner","kismet, netstumbler and aircrack"],"c":"B","s":"","e":"hping2, hping3 and scapy are common packet-crafting tools."},{"id":34,"q":"The active directory database file is:","a":"NTDS.DIT","d":["NTDS.DAT","NTDS.MDB","MSAD.DIT","MDAD.MDB"],"c":"E","s":"","e":"The Active Directory database is NTDS.DIT, holding all domain objects and their password hashes."},{"id":35,"q":"Which nmap flag enables OS TCP/IP stack fingerprinting?","a":"-O","d":["-sS","-v","-n","-P0"],"c":"B","s":"","e":"nmap -O enables OS detection through TCP/IP stack fingerprinting."},{"id":36,"q":"Which of the following is NOT an EAP method?","a":"EAP-RSA","d":["EAP-PSK","EAP-TTLS","EAP-TLS","EAP-MD5"],"c":"D","s":"","e":"EAP-RSA is not a real EAP method; valid ones include EAP-TLS, EAP-TTLS, PEAP, LEAP and EAP-MD5."},{"id":37,"q":"What is the significance of the string \"SEP\" in the configuration filename of a Cisco IP phone?","a":"It stands for Selsius Ethernet Phone, which was the original name of the Cisco IP phone.","d":["It stands for Skinny Enchanced Phone.","It stands for Cisco Ethernet Phone, but someone misspelled it and the name stuck.","It stands for SIP Enhanced Phone.","No one knows."],"c":"D","s":"","e":"SEP in a Cisco IP phone config filename stands for Selsius Ethernet Phone, Cisco's original VoIP brand, followed by the MAC."},{"id":38,"q":"Which of these is an IP option?","a":"Record Route","d":["Timestamp","Maximum Segment Size","Window Scale","SACK"],"c":"B","s":"","e":"Record Route is an IP option that records the hops a packet traverses."},{"id":39,"q":"Which of the following are all ONC/RPC services?","a":"cmsd, kcms_server, sadmind, snmpXdmid","d":["telnet, ssh, ftp, http","rusersd, rstatd, sprayd, rexec","rexec, rlogin, rsh, rsync","ntp, nfs, netbios, nntp"],"c":"F","s":"","e":"cmsd, kcms_server, sadmind and snmpXdmid are all ONC/RPC services, several historically exploitable."},{"id":40,"q":"When was the Apache chunked encoding vulnerability fixed in version 1.3?","a":"1.3.26","d":["1.3.1","1.3.42","1.3.24","1.3.20"],"c":"G","s":"","e":"The Apache 1.3 chunked-encoding overflow was fixed in version 1.3.26."},{"id":41,"q":"An accepted limitation of Diffie-Hellman key agreement protocol is","a":"It is vulnerable to a man-in-the-middle attack","d":["It is vital to keep the shared prime secret","It is possible for one of the peers to control the generated secret","It can only generate encryption keys up to 128 bits","An attacker who can monitor the exchange can determine the shared secret"],"c":"B","s":"","e":"Diffie-Hellman on its own is vulnerable to man-in-the-middle, so it must be combined with authentication (signatures or certificates)."},{"id":42,"q":"What are the privileged TCP and UDP ports, which only a privileged user can listen on?","a":"0-1023 inclusive","d":["1024-65535 inclusive","0-1024 inclusive","32768-65535 inclusive","0-65535 inclusive"],"c":"B","s":"","e":"Ports 0-1023 are the privileged (well-known) ports; only a privileged user (root) can bind them."},{"id":43,"q":"What attack can be used to force some switches to forward frames to all ports?","a":"MAC flooding","d":["IP fragmentation","LAND attack","ARP spoofing or ARP poisoning","VLAN hopping"],"c":"D","s":"","e":"MAC flooding overflows the switch CAM table, forcing it to fail open and flood frames to all ports so they can be sniffed."},{"id":44,"q":"Which of the following protocols is the most secure?","a":"WPA with CCMP (AES)","d":["WEP","WEP2","WPA with TKIP (RC4)","WEPplus"],"c":"D","s":"","e":"WPA with CCMP (AES) is the strongest of the listed options; WEP and TKIP are broken or weak."},{"id":45,"q":"What command would you use to display the version number of a Microsoft SQL Server database if you are connected with a command line client?","a":"select @@version;","d":["select version();","display version;","get version;","show version;"],"c":"J","s":"","e":"SELECT @@version returns the SQL Server version banner, used to fingerprint the database."},{"id":46,"q":"A web server returns \"Server: Microsoft-IIS/5.0\" in the HTTP headers. What operating system is it probably using?","a":"Windows 2000 Server","d":["Windows NT4 Server","Windows 2003 Server","Windows XP","Windows 2008 Server"],"c":"G","s":"","e":"Server: Microsoft-IIS/5.0 implies Windows 2000, since IIS 5.0 shipped with that OS."},{"id":47,"q":"Some older TCP implementations are vulnerable to a DoS attack that exploits the small queue for connections in progress?","a":"SYN flood","d":["Predictable Initial Sequence Numbers","SMURF Attack","Teardrop Attack","LAND Attack"],"c":"B","s":"","e":"A SYN flood fills the small half-open connection queue with bogus SYNs, denying service to legitimate clients."},{"id":48,"q":"What is the function of the /etc/ftpusers file on a Unix FTP server?","a":"It lists the users that are NOT permitted to use the FTP server.","d":["It is not used for anything.","It lists IP addresses that users can connect to the FTP server from.","It lists the users that are permitted to use the FTP server.","It selects the authentication mechanism for the FTP server."],"c":"F","s":"","e":"/etc/ftpusers lists the users who are NOT permitted to log in via FTP (such as root)."},{"id":49,"q":"In active directory, what does FSMO (pronounced \"Fizz-Mo\") stand for?","a":"Flexible Single Master Operations","d":["Fixed Single Master Operations","Flexible Security Master Operations","Forest Single Master Operations","Forest Security Master Operations"],"c":"E","s":"","e":"FSMO stands for Flexible Single Master Operations, the five specialised AD roles such as PDC Emulator, RID and Schema masters."},{"id":50,"q":"What TCP port does Microsoft SQL Server listen on in hidden mode?","a":"2433","d":["3306","1434","1521","1433"],"c":"J","s":"","e":"Several exam sources state a hidden SQL Server instance uses TCP 2433; in practice enabling 'Hide Instance' keeps the configured port (usually 1433) but stops it answering the UDP 1434 browser. 2433 is the commonly-expected exam answer."},{"id":51,"q":"During a penetration test, you gain access to a database containing personal details of staff. What is the best course of action?","a":"Note the issue but do not store any of the personal data on your system.","d":["Publish the information in a case study.","Change the database settings to address the vulnerability.","Drop the database so hackers cannot access this data.","Take a copy of the database so you can use it in your report."],"c":"A","s":"","e":"Note the finding but never copy personal data onto your own kit, data-protection duties apply even mid-test."},{"id":52,"q":"When should the scope of work be defined?","a":"Before testing is started.","d":["After testing is completed, but before the report is written.","As soon as possible after testing is started.","During testing, based on the results from the port scan.","The scoping is optional, and may be omitted if the client agrees."],"c":"A","s":"","e":"Scope must be agreed before testing begins, it is what authorises and bounds the work."},{"id":53,"q":"Which of these techniques is commonly implemented in modern C compilers to prevent buffer overflow exploitation?","a":"Canary values","d":["Loop unrolling","Register optimisation","Stack alignment","Inline functions"],"c":"B","s":"","e":"Stack canary values sit before the return address so a buffer overflow that overwrites them is detected before the function returns."},{"id":54,"q":"Which of the following encryption algorithms is an asymmetric cipher?","a":"RSA","d":["DES","3DES","AES","RC5"],"c":"B","s":"","e":"RSA is an asymmetric cipher, using a public/private key pair."},{"id":55,"q":"What are the valid key lengths for the AES encryption cipher?","a":"128, 192 and 256","d":["128 and 256","56, 112 and 168","64, 128 and 256","128, 160 and 256"],"c":"B","s":"","e":"AES supports 128, 192 and 256-bit keys (its block size is always 128)."},{"id":56,"q":"Which are the six base SIP methods?","a":"REGISTER, INVITE, ACK, CANCEL, BYE, OPTIONS","d":["REGISTER, UNREGISTER, ACK, NAK, HELLO, BYE","REGISTER, ASSOCIATE, DISASSOCIATE, CANCEL, BYE, OPTIONS","REGISTER, INVITE, ACK, HELLO, BYE, OPTIONS","GET, POST, HEAD, OPTIONS, TRACE, CONNECT"],"c":"D","s":"","e":"The six base SIP methods are REGISTER, INVITE, ACK, CANCEL, BYE and OPTIONS."},{"id":57,"q":"Which scan would be most likely to discover a firewall that blocks all traffic to itself from the interface connected to the network you are scanning from?","a":"ARP scan","d":["UDP port scan","Ping sweep","SNMP query","TCP port scan"],"c":"B","s":"","e":"An ARP scan reaches a host on the local segment at Layer 2 even when it drops all IP traffic to itself."},{"id":58,"q":"You find a system that is offering the NFS RPC service. What is the logical next step?","a":"Run \"showmount -e\" to list the NFS exports.","d":["Report it as a vulnerability.","Try to find a buffer overflow vulnerability in the NFS service.","Leave it and move on because there are no known vulnerabilities in NFS.","Try to mount an exported filesystem."],"c":"F","s":"","e":"On finding an NFS service, run showmount -e to list the exported shares and who may mount them."},{"id":59,"q":"What is this: password 7 052D131D33556C081D021200","a":"A password encoded with the reversible Cisco vigenere algorithm","d":["A password encoded with Unix crypt","A password encoded with unsalted DES","A password encoded with salted MD5","A password with the literal value \"052D131D33556C081D021200\""],"c":"B","s":"","e":"'password 7 ...' is a Cisco Type 7 password, weakly encoded with a reversible Vigenere cipher and trivially decoded."},{"id":60,"q":"What identifies the superuser on a Unix or Linux system?","a":"Any user with UID 0 (zero) in the password file.","d":["Any user with UID 65535 in the password file.","Anyone who logs on at the system console.","Any user that belongs to the \"root\" group in the group file.","The user with the username \"root\" in the password file."],"c":"F","s":"","e":"On Unix the superuser is any account with UID 0, not just the name root."},{"id":61,"q":"Which command will retrieve the version number from default installations of the BIND nameserver software?","a":"dig @nameserver version.bind txt chaos","d":["dig @nameserver nameserver.version txt chaos","dig @nameserver version.bind hinfo chaos","dig @nameserver bind.version txt chaos","dig @nameserver bind-version txt chaos"],"c":"C","s":"","e":"dig version.bind txt chaos queries the special CHAOS-class record that many BIND servers answer with their version."},{"id":62,"q":"The UK Government protective marking levels are, from lowest to highest protection:","a":"NPM, PROTECT, RESTRICTED, CONFIDENTIAL, SECRET, TOP SECRET.","d":["TOP SECRET, SECRET, CONFIDENTIAL, RESTRICTED.","CONFIDENTIAL, SECRET, TOP SECRET.","NPM, RESTRICTED, PROTECT, CONFIDENTIAL, SECRET, TOP SECRET.","CLASSIFIED, INTERNAL USE ONLY, SECRET, TOP SECRET."],"c":"A","s":"","e":"This is the legacy UK marking scheme (pre-2014): NPM, PROTECT, RESTRICTED, CONFIDENTIAL, SECRET, TOP SECRET."},{"id":63,"q":"What are the SIP and RTP protocols used for in VoIP?","a":"SIP is used for setting up and closing down calls, and RTP is used for audio data transmission.","d":["SIP and RTP are competing protocols that are both used for setting up and tearing down calls.","SIP is used for setting up and closing down calls, but RTP is nothing to do with VoIP.","RTP is used for setting up and closing down calls, and SIP is used for audio data transmission.","SIP and RTP are competing protocols that are both used for audio data transmission."],"c":"D","s":"","e":"In VoIP, SIP sets up and tears down calls (signalling), while RTP carries the actual audio/media stream."},{"id":64,"q":"What is the primary legal reason for obtaining written permission before starting a test?","a":"Because otherwise the penetration test might breach the Computer Misuse Act.","d":["Because otherwise the penetration test might breach the Human Rights Act.","Because otherwise the penetration test might breach the Data Protection Act.","There are no legal reasons, only commercial reasons.","Because otherwise the client might not pay for the work."],"c":"A","s":"","e":"Without written permission the access is unauthorised and breaches the Computer Misuse Act 1990."},{"id":65,"q":"Which of the following statements about the time protocols \"time\", \"daytime\" and \"NTP\" are correct?","a":"\"time\" represents the time as a 32-bit value, \"daytime\" uses an ASCII string, and \"NTP\" uses a 64-bit value.","d":["\"time\" represents the time as a 32-bit value, \"daytime\" uses a 64-bit value, and \"NTP\" uses an ASCII string.","\"time\" represents the time as a 64-bit value, \"daytime\" uses an ASCII string, and \"NTP\" uses a 32-bit value.","\"time\" represents the time as an ASCII string, \"daytime\" uses a 32-bit value, and \"NTP\" uses a 64-bit value.","\"time\" represents the time as an ASCII string, \"daytime\" uses a 64-bit value, and \"NTP\" uses a 32-bit value."],"c":"D","s":"","e":"time returns a 32-bit value, daytime returns an ASCII string, and NTP uses a 64-bit timestamp."},{"id":66,"q":"Which of these is not a valid IP address?","a":"192.168.300.1","d":["10.0.0.1","172.16.3.7","195.32.67.14","192.168.0.1"],"c":"B","s":"","e":"192.168.300.1 is invalid because an octet cannot exceed 255."},{"id":67,"q":"What command would you use to list the installed patches on a Solaris system?","a":"showrev -a or showrev -p","d":["patchlist or pkglist","cat /etc/patchlist","pkginfo","pkg_info"],"c":"F","s":"","e":"showrev -p (or -a) lists the patches installed on a Solaris system."},{"id":68,"q":"On a Unix system, what is the effect of the execute bit on a directory?","a":"It allows the directory to be traversed.","d":["It allows all files in the directory to be executed.","It allows the directory to be executed.","It depends on the version of Unix that is being used.","It has no effect."],"c":"F","s":"","e":"The execute bit on a directory permits traversing into it to access files by name, separate from the right to list it."},{"id":69,"q":"What is this: 17:58:01.396446 CDPv2, ttl: 180s, Device-ID 'chestnut.nta-monitor.com', length 404","a":"A CDP broadcast","d":["A NetBIOS over TCP/IP session service broadcast","A NetBIOS over TCP/IP name service broadcast","An ARP broadcast","A Spanning Tree Protocol broadcast"],"c":"D","s":"","e":"A CDPv2 packet advertising a Device-ID is a Cisco Discovery Protocol broadcast, leaking device details."},{"id":70,"q":"What are the four mandatory transform attributes for an IKE Phase-1 SA?","a":"Encryption Algorithm, Hash Algorithm, Authentication Method, Diffie Hellman Group","d":["Protocol ID, Transform ID, IPsec Mode, Authentication Algorithm","SA Lifetime, Hash Algorithm, Authentication Method, PRF","Encryption Algorithm, Key Length, Authentication Method, SA Lifetime","SA Lifetime, Key length, PRF, Field Size"],"c":"D","s":"","e":"An IKE Phase-1 SA needs four transforms: encryption algorithm, hash algorithm, authentication method and Diffie-Hellman group."},{"id":71,"q":"What command would you use to list the installed packages on a Redhat or Fedora system?","a":"rpm -qa","d":["pkginfo","cat /proc/sys/packages","pkg_info","dpkg -l"],"c":"F","s":"","e":"rpm -qa lists all installed packages on a Red Hat or Fedora system."},{"id":72,"q":"Where are the encrypted passwords stored on a FreeBSD system?","a":"/etc/master.passwd","d":["/etc/shadow","/etc/group","In the TPM chip","/etc/passwd"],"c":"F","s":"","e":"FreeBSD stores its hashed passwords in /etc/master.passwd."},{"id":73,"q":"You discover a vulnerability on an Internet accessible web server which allows you to execute commands as a non-privileged user. The web server is behind a firewall that allows only TCP port 80 inbound and permits all outbound traffic. What technique could be used to get shell access to the webserver?","a":"Run a shell on the webserver and connect its control channel back to a TCP port on your local system.","d":["It is not possible to obtain shell access in these circumstances.","Run a shell on the webserver with its control channel listening on a high TCP port.","Run a shell on the webserver with its control channel listening on TCP port 81.","Run a shell on the webserver with its control channel listening on TCP port 80."],"c":"G","s":"","e":"Use a reverse shell: have the web server connect its shell back out to you, riding the firewall's permissive outbound rule."},{"id":74,"q":"If you find TCP port 111 open on a Unix system, what is the next logical step to take?","a":"Run \"rpcinfo -p\" to enumerate the RPC services.","d":["Telnet to the port to look for a banner.","Report it as a vulnerability.","Telnet to the port, send \"GET / HTTP/1.0\" and gather information from the response.","Run amap against it to determine what service is running on that port."],"c":"F","s":"","e":"Port 111 is the RPC portmapper; run rpcinfo -p to enumerate the RPC services behind it."},{"id":75,"q":"Which protocol and port does a normal DNS lookup use?","a":"UDP port 53","d":["UDP port 43","TCP port 45","TCP port 43","TCP port 53"],"c":"B","s":"","e":"A normal DNS lookup uses UDP port 53."},{"id":76,"q":"Which of the following web application technologies would you expect to be most secure?","a":"A pure Java application","d":["A PHP4 application","A Perl application running under MOD-Perl","A Perl application running as CGI scripts","A PHP3 application"],"c":"G","s":"","e":"A pure Java application is cited as most secure here, thanks to managed memory, strong typing and sandboxing."},{"id":77,"q":"Which nmap command performs a half-open or \"SYN\" TCP portscan?","a":"nmap -n -P0 -v -sS -p1-1024 hostname","d":["nmap -n -P0 -v -sN -p1-1024 hostname","nmap -n -P0 -v -sF -p1-1024 hostname","nmap -n -P0 -v -sA -p1-1024 hostname","nmap -n -P0 -v -sT -p1-1024 hostname"],"c":"B","s":"","e":"nmap -sS performs a half-open SYN scan, sending a SYN but never completing the handshake."},{"id":78,"q":"Which command will perform a DNS zone transfer of the domain \"company.com\" from the nameserver at 10.0.0.1?","a":"dig @10.0.0.1 company.com axfr","d":["dig @10.0.0.1 company.com zone-transfer","dig @10.0.0.1 company.com.zone","dig @10.0.0.1 company.com ls","dig @10.0.0.1 company.com any"],"c":"C","s":"","e":"dig @server domain axfr requests a full zone transfer; if the server allows it, you get every record."},{"id":79,"q":"What is this: 17:57:57.850175 802.1d config 8064.00:0c:85:f1:3f:80.8010 root 8064.00:0b:46:48:29:80 pathcost 19 age 1 max 20 hello 2 fdelay 15","a":"A Spanning Tree Protocol broadcast","d":["A NetBIOS over TCP/IP name service broadcast","A NetBIOS over TCP/IP session service broadcast","An ARP broadcast","A CDP broadcast"],"c":"D","s":"","e":"An 802.1d config frame announcing a root bridge is a Spanning Tree Protocol BPDU."},{"id":80,"q":"Which of these is not an ICMP message type?","a":"Host unreachable","d":["Router Solicitation","Echo request","Echo reply","Source Quench"],"c":"D","s":"","e":"'Host unreachable' is a code under the Destination Unreachable type (3), not a top-level ICMP message type."},{"id":81,"q":"What version of NFS includes strong security, including strong authentication and encryption?","a":"version 4","d":["version 3","version 2","version 5","version 1"],"c":"F","s":"","e":"NFSv4 adds strong security, including strong authentication and encryption (e.g. via Kerberos)."},{"id":82,"q":"The DNS entries for www.customer.com and www.example.com both point to the same IP address. How does the web server know which domain is being requested by the browser?","a":"It uses the HTTP Host: header.","d":["It inspects the cookies sent by the client.","Both websites must have the same content.","It inspects the client's SSL certificate.","It uses a reverse DNS lookup of the client's IP address."],"c":"C","s":"","e":"Name-based virtual hosting uses the HTTP Host header to decide which site to serve from a shared IP."},{"id":83,"q":"If an attacker gained access to a Microsoft SQL server using the \"sa\" account, which stored procedure would he use to add a user account?","a":"xp_cmdshell","d":["xp_adduser","xp_commandshell","sp_cmdshell","sp_commandshell"],"c":"J","s":"","e":"With the sa account you can call xp_cmdshell to run OS commands such as net user to add an account."},{"id":84,"q":"Which of these is an Ethernet multicast MAC address?","a":"01:00:0c:cc:cc:cc","d":["00-10-db-74-d0-52","000b.dbb2.fa60","00:10:db:74:d0:52"],"c":"B","s":"","e":"01:00:0c:cc:cc:cc is a multicast MAC (used by Cisco CDP/PVST); the set low bit of the first octet marks multicast."},{"id":85,"q":"What technique forwards traffic to an attacker's system by associating the attacker's MAC address with the IP address of the target system?","a":"ARP spoofing or ARP poisoning","d":["SMURF attack","Teardrop attack","LAND attack","ARP flooding"],"c":"B","s":"","e":"ARP spoofing/poisoning binds the attacker's MAC to another host's IP, redirecting traffic for a man-in-the-middle."},{"id":86,"q":"Which of these methods is the best way to determine if a remote host is running an X Window server that allows remote connections from the local host?","a":"Run \"xdpyinfo -display remotehost:0.0\"","d":["Check to see if UDP port 177 is open","Check to see if TCP port 6000 is open","Check to see if TCP port 6001 is open","Run \"xterm -display remotehost:0.0\""],"c":"B","s":"","e":"xdpyinfo -display host:0.0 tests whether a remote X server is reachable and running."},{"id":87,"q":"What is the default password for the SYS user on Oracle 9i and 10g?","a":"CHANGE_ON_INSTALL","d":["DBSNMP","There is no default","SYSADM","MANAGER"],"c":"J","s":"","e":"Older Oracle shipped the SYS account with the default password CHANGE_ON_INSTALL."},{"id":88,"q":"UDP port 1434 is commonly used by which database?","a":"Microsoft SQL Server","d":["Oracle 9i","MySQL","Postgres","DB2"],"c":"J","s":"","e":"UDP 1434 is the SQL Server Browser/Resolution service, the port the Slammer worm abused."},{"id":89,"q":"AJAX is","a":"Asynchronous Javascript and XML","d":["Automatic Java and XML","Apache Javascript and XML","A household cleaner","A Dutch football team"],"c":"G","s":"","e":"AJAX stands for Asynchronous JavaScript and XML, used to update pages without a full reload."},{"id":90,"q":"You connect to TCP port 22 on a target system and receive the banner \"SSH-1.99-OpenSSH_3.9p1\". Which of the following statements about this system are true?","a":"It is an SSH server, and supports SSH version 1 and version 2.","d":["It is an SSH server, and supports SSH version 1 only.","It is an SSH server, and supports SSH version 2 only.","It is an SSH server, and only allows connections from an OpenSSH client.","It is an SSH server, and supports SSH version 1.99."],"c":"F","s":"","e":"The banner SSH-1.99 means the server supports both SSH protocol 1 and 2; protocol 1 should be disabled."},{"id":91,"q":"What are the three main pieces of legislation that are relevant to penetration testing in the UK?","a":"The Computer Misuse Act, The Human Rights Act and The Data Protection Act.","d":["The Freedom of Information Act, The Data Protection Act and The Terrorism Act.","The Terrorism Act, The Freedom of Information Act and The Computer Misuse Act.","The Food Standards Act, The Misuse of Drugs Act and The Breeding and Sale of Dogs Act.","The Rehabilitation of Offenders Act, The Employment Relations Act and The Human Rights Act."],"c":"A","s":"","e":"The core UK trio: Computer Misuse Act, Human Rights Act and Data Protection Act."},{"id":92,"q":"What is the OUI part of the Ethernet MAC address 00:0B:46:48:29:80?","a":"00:0B:46","d":["00:0B","00:0b:46:48:29","00:0b:46:48","00"],"c":"B","s":"","e":"The OUI is the first three bytes of a MAC (here 00:0B:46), identifying the hardware vendor."},{"id":93,"q":"What is the name of the database administrator account on Microsoft SQL server?","a":"sa","d":["dbo","root","administrator","admin"],"c":"J","s":"","e":"sa is SQL Server's default built-in sysadmin account, a prime brute-force target."},{"id":94,"q":"When was the Apache chunked encoding vulnerability fixed in version 2.0?","a":"2.0.39","d":["2.0.36","2.0.30","2.0.1","2.0.64"],"c":"G","s":"","e":"The Apache 2.0 chunked-encoding vulnerability was fixed in version 2.0.39."},{"id":95,"q":"The register_globals setting in php.ini is","a":"A security risk if enabled, and should never be used.","d":["Nothing to do with security, and the setting depends on the developers preference.","Nothing to do with security, but can improve the performance of PHP scripts.","Nothing to do with security, but can reduce the memory usage of PHP scripts.","A security benefit and should always be enabled."],"c":"G","s":"","e":"PHP's register_globals auto-creates variables from request input, a serious security risk that is long deprecated."},{"id":96,"q":"What command might you use to obtain a list of systems from a master browser, together with details about the version and available services.","a":"nbtstat or better nbtscan","d":["amap","lservers","nbtquery","hping3"],"c":"E","s":"","e":"nbtstat (or the faster nbtscan) queries NetBIOS to list systems from the master browser with their versions and services."},{"id":97,"q":"What password hashes are stored by default on a Windows 2003 system?","a":"LM Hash and NTLM Hash","d":["Salted MD5","Unix crypt","DES","MD4"],"c":"B","s":"","e":"Windows 2003 stores both LM and NTLM password hashes by default."},{"id":98,"q":"What is the length of the IV for a WEP key?","a":"24 bits","d":["128 bits","64 bits","40 bits","56 bits"],"c":"D","s":"","e":"WEP uses a 24-bit Initialisation Vector, far too small, which causes IV reuse and ultimately key recovery."},{"id":99,"q":"What is the normal sequence of events in a penetration test?","a":"Scoping, Testing, Report Writing, Debrief.","d":["Testing, Scoping, Report Writing, Debrief.","Debrief, Testing, Scoping, Report Writing.","Testing, Scoping, Debrief, Report Writing.","Scoping, Report Writing, Testing, Debrief."],"c":"A","s":"","e":"The standard engagement flow is Scoping, Testing, Report Writing, then Debrief."},{"id":100,"q":"What is the default VLAN on most switches?","a":"VLAN 1","d":["VLAN 4096","VLAN 1000","VLAN 0","VLAN 4095"],"c":"D","s":"","e":"VLAN 1 is the default VLAN on most switches; leaving management traffic on it is a common weakness."},{"id":101,"q":"Which Act amended the Computer Misuse Act 1990?","a":"The Police and Justice Act 2006.","d":["The Police and Criminal Evidence Act.","The Regulation of Investigatory Powers Act 2000.","The Terrorism Act 2006.","The Terrorism Act 2000."],"c":"A","s":"","e":"The Police and Justice Act 2006 amended the CMA 1990, adding the tool-making offence (S3A)."},{"id":102,"q":"Should users be informed that a penetration test is being carried out?","a":"Yes, they have a right to know when their privacy may be breached unless the system's AUP says otherwise.","d":["No, they don't have any need to know.","Yes, because it is always polite to keep people informed.","Yes, they might want to observe the penetration testing process.","No. It is vital that they are not aware or they may interfere with the testing process."],"c":"A","s":"","e":"Generally yes, users have a privacy right to be informed unless the Acceptable Use Policy says otherwise."},{"id":103,"q":"Which tool is commonly used for passive TCP/IP fingerprinting?","a":"p0f","d":["nmap","hping2","scapy","nbtstat"],"c":"B","s":"","e":"p0f is the classic passive TCP/IP fingerprinting tool."},{"id":104,"q":"What amount of disruption to the client's systems is acceptable during a penetration test?","a":"None, and the client should report any anomalous behaviour immediately.","d":["Quite a lot. Disruption is to be expected during a full penetration test.","It depends, but the client should be asked not to bother the testers as they have enough to deal with.","There should be no disruption if the systems are secure, but the client should expect disruption if there are vulnerabilities.","An few spontaneous reboots and occasional data corruption, but nothing really bad."],"c":"A","s":"","e":"Ideally none; the client should report anomalies, and any disruptive testing needs prior agreement."},{"id":105,"q":"Which protocols are associated with IPsec?","a":"UDP port 500, IP protocol 50 and IP protocol 51","d":["IP protocol 89","TCP port 1723 and IP protocol 47","IP protocol 94","TCP port 443"],"c":"D","s":"","e":"IPsec uses UDP 500 (IKE), IP protocol 50 (ESP) and IP protocol 51 (AH)."},{"id":106,"q":"What is TCP and UDP port number 111 typically used for on a Unix system?","a":"The ONC/RPC portmapper.","d":["The network time protocol (NTP).","Nothing. Port 111 is not assigned.","The Simple Network Management Protocol (SNMP).","The DCE/RPC location service."],"c":"F","s":"","e":"TCP/UDP 111 is the ONC/RPC portmapper (rpcbind), the directory that maps RPC services to their ports."},{"id":107,"q":"What is the maximum length of an SSID?","a":"32 Bytes","d":["48 Bytes","64 Bytes","16 Bytes","24 Bytes"],"c":"D","s":"","e":"An SSID can be up to 32 bytes/characters long."},{"id":108,"q":"What is the primary objective of risk management?","a":"To reduce the risk to an acceptable level.","d":["To determine what budget should be assigned to information security.","To assign responsibility for the various issues that have been discovered.","To understand the level of risk.","To remove all risk."],"c":"A","s":"","e":"Risk management aims to reduce risk to an acceptable (tolerable) level, not to zero."},{"id":109,"q":"What is the blocksize of the AES encryption cipher?","a":"128 bits","d":["64 bits","40 bits","56 bits","256 bits"],"c":"B","s":"","e":"AES always uses a 128-bit block size, regardless of key length."},{"id":110,"q":"What is the security model that limits Java applications to a restricted set of functions?","a":"Sandbox","d":["chroot jail","firewall","IDS","Object oriented coding"],"c":"F","s":"","e":"The Java sandbox is the security model that confines applets to a restricted set of functions."},{"id":111,"q":"What does EAP stand for?","a":"Extensible Authentication Protocol","d":["Extensible Accounting Protocol","Enhanced Authentication Protocol","Extended Authentication Protocol","Extensible Authorization Protocol"],"c":"D","s":"","e":"EAP stands for Extensible Authentication Protocol, the framework behind 802.1X authentication methods."},{"id":112,"q":"What does LAMP stand for?","a":"Linux Apache MySQL PHP","d":["Lightweight Automated MySQL or Postgres","Linux Ajax MySQL Perl","It's just a name, it doesn't stand for anything.","Linux ASP Multi-User Processing"],"c":"G","s":"","e":"LAMP stands for Linux, Apache, MySQL, PHP, the classic open-source web stack."},{"id":113,"q":"Which protocol and port does a DNS zone transfer use?","a":"TCP port 53","d":["TCP port 43","UDP port 43","TCP port 45","UDP port 53"],"c":"C","s":"","e":"Zone transfers use TCP 53, whereas ordinary lookups use UDP 53."},{"id":114,"q":"On which web server would you expect to find ISAPI filters and extensions?","a":"Microsoft IIS","d":["Apache","Sun ONE Web server","IBM Websphere","iPlanet Web Server"],"c":"G","s":"","e":"ISAPI filters and extensions are a feature of Microsoft IIS."},{"id":115,"q":"Which of the following protocols provides confidentiality and integrity, and is not vulnerable to a man-in-the-middle attack?","a":"SSH v2","d":["IPsec using AH","Telnet","SSH v3","SSH v1"],"c":"D","s":"","e":"SSH v2 provides confidentiality and integrity and, unlike SSHv1, is not vulnerable to the known MITM/integrity flaws."},{"id":116,"q":"During an audit of a Unix system, you find that the file \"/etc/crontab\" is owned by root and has mode 0666. What is the most serious risk associated with this?","a":"Privilege escalation: any user could create a cron job which would run as root.","d":["Informational: /etc/crontab is not used on modern Unix systems, but it does not represent a risk.","Information leakage: any user may view the crontab file.","Privilege escalation: this indicates that the \"cron\" daemon is running, and it might be vulnerable to a buffer overflow.","Informational: This indicates that the \"crontab\" package is installed, but it does not represent a risk."],"c":"F","s":"","e":"A world-writable /etc/crontab (mode 0666) lets any user add a root cron job, a direct privilege escalation."},{"id":117,"q":"Which string in a NetBIOS name indicates that the specified host is a Master Browser?","a":"MSBROWSE","d":["MASTER-BROWSER","MASTERBROWSER","MS-BROWSER","MS-BROWSE"],"c":"E","s":"","e":"The MSBROWSE marker in a NetBIOS name table identifies that host as the segment's Master Browser."},{"id":118,"q":"What is the underlying cause of the WEP vulnerability?","a":"Weak initialisation vector.","d":["Weak hash algorithm.","Insufficient key length.","Weak encryption algorithm.","Lack of authentication between the client and AP."],"c":"B","s":"","e":"WEP's weakness comes from its short, reused initialisation vector (IV) combined with RC4."},{"id":119,"q":"TCP port 1433 is commonly used by which database?","a":"Microsoft SQL Server","d":["DB2","Postgres","MySQL","Oracle 9i"],"c":"J","s":"","e":"TCP 1433 is Microsoft SQL Server's default listening port."},{"id":120,"q":"On a Solaris system, what controls if the superuser is allowed to login over Telnet?","a":"The CONSOLE setting in /etc/default/login","d":["There is no control, the superuser is always allowed to login over Telnet.","It depends on the version of Solaris.","The SUID bit on /usr/bin/in.telnetd.","There is no control, the superuser is never allowed to login over Telnet."],"c":"F","s":"","e":"On Solaris the CONSOLE entry in /etc/default/login controls whether root may log in over Telnet."},{"id":121,"q":"What is the function of the ARP protocol?","a":"It maps IP addresses to layer-2 hardware addresses.","d":["It caches frequently used host names.","It assigns an IP address to a host.","It maps host names to IP addresses.","It determines the OUI for layer-2 hardware addresses."],"c":"D","s":"","e":"ARP maps IP (Layer 3) addresses to MAC (Layer 2) hardware addresses on the local network."},{"id":122,"q":"Which of these standards defines the structure of a digital certificate?","a":"X.509","d":["X.400","X.500","X.25","X.21"],"c":"B","s":"","e":"X.509 defines the structure of a digital certificate."},{"id":123,"q":"A client asks what effect the penetration test is likely to have on the systems being tested. What would be the best response?","a":"There will probably be a large number of log entries, and some accounts may be locked out by password guessing.","d":["I don't know, they are your systems not mine.","None at all.","All sorts of things can happen, it's pretty random and there is no way to predict it.","If they are secure, then they will be alright."],"c":"A","s":"","e":"Expect a large number of log entries and possibly some account lockouts from password guessing."},{"id":124,"q":"What is the most secure method to use if you need to run an X Window client on a remote system and display it on your local X server?","a":"Establish an SSH connection to the remote system and tunnel the X Window connection back to your X Server.","d":["Use the Sun-DES authentication method.","Use the XDM-Authorization authentication method.","Use the MIT-Magic-Cookie authentication method.","Use \"xhost +\" to allow any system to connect to the X server."],"c":"F","s":"","e":"Tunnel X11 over SSH (ssh -X) to display a remote client securely on your local X server."},{"id":125,"q":"What are the seven OSI layers, from lowest to highest?","a":"Physical, Data Link, Network, Transport, Session, Presentation, Application","d":["Physical, Data Link, Transport, Network, Session, Presentation, Application","Physical, Data Link, Network, Transport, Presentation, Session, Application","Physical, Network, Data Link, Transport, Session, Presentation, Application","Data Link, Physical, Network, Transport, Session, Presentation, Application"],"c":"B","s":"","e":"The OSI layers low to high are Physical, Data Link, Network, Transport, Session, Presentation, Application."},{"id":126,"q":"What does the HTTP status code 410 mean?","a":"Gone","d":["Temporaly moved","Moved temporaly","Forbiddden","Method not allowed"],"c":"G","s":"","e":"HTTP 410 means Gone, the resource is permanently unavailable (stronger than a 404)."},{"id":127,"q":"What is the HTTP status code for 'Moved Permanently'?","a":"301","d":["302","303","304","310"],"c":"G","s":"","e":"HTTP 301 means Moved Permanently."},{"id":128,"q":"What is the HTTP status code for 'Not Found'?","a":"404","d":["400","401","402","403"],"c":"G","s":"","e":"HTTP 404 means Not Found."},{"id":129,"q":"What effects HTTP Request Smuggling?","a":"Content Length","d":["Content Header","Body Chunk","Session Lifetime","Header Content"],"c":"G","s":"","e":"HTTP request smuggling exploits disagreement over the Content-Length (and Transfer-Encoding) header between a proxy and the back-end server."},{"id":130,"q":"In a firewalled environment where ICMP replies are blocked which command is correct to scan all ports in a network?","a":"nmap -P0 -p- x.x.x.x","d":["nmap -sS -p1-65335 x.x.x.x","nmap -sT -p- x.x.x.x","nmap -O -p1-65536 x.x.x.x","nmap -sX -p- x.x.x.x"],"c":"B","s":"","e":"nmap -P0/-Pn skips host discovery so you can scan even when ICMP is filtered; -p- scans all ports."},{"id":131,"q":"Which command can be used to find the name of the Active Directory domain controller?","a":"nltest and nslookup -type=any","d":["nbtquery","nbtstat","dcpromo","ping"],"c":"E","s":"","e":"nltest and nslookup -type=any can locate the domain controller for an Active Directory domain."},{"id":132,"q":"In a Pentest you get the following results from a SMB NULL session:\n\nnet use \\\\hostname\\ipc$ \"password\" /u:\"guest\"\nERROR 1331\nnet use \\\\hostname\\ipc$ \"password\" /u:\"guest\"\nERROR\nnet use \\\\hostname\\ipc$ \"password\" /u:\"guest\"\nERROR\nnet use \\\\hostname\\ipc$ \"password\" /u:\"guest\"\nERROR 1909\n\nWhat answer is correct?","a":"The account guest exists but is disabled and the password of this user is password.","d":["The account guest is enabled but the password of this user is wrong.","The password is correct and guests can login.","The username does not exist.","The username and password is wrong."],"c":"E","s":"","e":"Error 1331 means the account exists but is disabled; the changed error confirms a valid username and password."},{"id":133,"q":"What protocol does tracert on Windows use?","a":"ICMP","d":["TCP","GRE","UDP","PING"],"c":"B","s":"","e":"Windows tracert uses ICMP echo requests."},{"id":134,"q":"What protocol does traceroute on Linux use?","a":"UDP","d":["TCP","GRE","ICMP","PING"],"c":"B","s":"","e":"Linux traceroute uses UDP datagrams by default."},{"id":135,"q":"Which is not a HTTP request method","a":"PROPGET","d":["OPTION","POST","PUT","PROPFIND"],"c":"G","s":"","e":"PROPGET is not a real HTTP method; the WebDAV method is PROPFIND. Valid methods include GET, POST, PUT and DELETE."},{"id":136,"q":"What is a URL?","a":"Uniform Resource Locator","d":["Uniform Resource Location","Uniform Response Location","Unique Resource Location","Unique Redirect Location"],"c":"G","s":"","e":"URL stands for Uniform Resource Locator."},{"id":137,"q":"What is WPA?","a":"Wifi Protected Access","d":["Wireless Proofed Acess","Wireless Permission Access","Wired Protected Access","Wired Permission Access"],"c":"D","s":"","e":"WPA stands for Wi-Fi Protected Access."},{"id":138,"q":"What is WEP?","a":"Wired Equivalent Privacy","d":["Wireless Enabled Protocol","Wireless Enabled Protection","Wireless Equivalent Protection","Wireless Encoded Protocol"],"c":"D","s":"","e":"WEP stands for Wired Equivalent Privacy."},{"id":139,"q":"What answer for PEAP and LEAP is correct?","a":"PEAP is a Microsft iinvention and LEAP a Cisco invention.","d":["PEAP uses only DES and LEAP only uses AES for authentication.","PEAP uses RSA and LEAP only SHA-1","PEAP uses SHA-1 and LEAP only RSA","PEAP uses mschapv2 and LEAP uses mschapv1."],"c":"D","s":"","e":"PEAP is a Microsoft invention and LEAP is a Cisco invention, both EAP authentication types."},{"id":140,"q":"What is SIP","a":"Session Initiation Protocol","d":["Session Independent Protocol","Secure Initiation Protocol","Secure Initialisation Protocol","Secure Initialisation Port"],"c":"D","s":"","e":"SIP stands for Session Initiation Protocol, used to set up VoIP calls."},{"id":141,"q":"What is SOAP","a":"Simple Object Access Protocol","d":["Simple Oriented Access Protocol","Simple Oriented Access Port","Secure Object and Protocol","Secure Object Enabled Priority"],"c":"G","s":"","e":"SOAP stands for Simple Object Access Protocol, an XML-based web-service messaging format."},{"id":142,"q":"What is SAML","a":"Security Assertion Markup Language","d":["Secure Assertion Markup Library","Secure Assertion Mixed Library","Secure Adopted Mixed Library","Secure Adopted Mixed Learning"],"c":"H","s":"","e":"SAML (Security Assertion Markup Language) is an XML standard for exchanging authentication and authorisation data, used for SSO."},{"id":143,"q":"What is a symmetric encrypted cipher?","a":"AES","d":["RSA","ECC","DH","DSA"],"c":"B","s":"","e":"AES is a symmetric cipher, the same key encrypts and decrypts."},{"id":144,"q":"What is the Asynchronous JavaScript and XML language?","a":"AJAX","d":["HTTP","HTTPS","SSHv1","Golang"],"c":"G","s":"","e":"AJAX is Asynchronous JavaScript and XML."},{"id":145,"q":"What does MAC (address) mean?","a":"Media Access Control","d":["Media Assisted Control","Media Association Control","Media Access Collaboration","Media Adress Control"],"c":"B","s":"","e":"MAC stands for Media Access Control, the hardware address."},{"id":146,"q":"What is CDP?","a":"Cisco Discovery Protocol","d":["Cisco Device Protocol","Cisco Deamon Protocol","Cisco Derivate Protocol","Cisco Discovery Port"],"c":"D","s":"","e":"CDP is the Cisco Discovery Protocol, a Layer 2 protocol that advertises device information to neighbours."},{"id":147,"q":"What is NetBIOS?","a":"Network Basic Input/Output System","d":["Network Board Input/Output System","Network Board Input/Output Session","Network Byte Input/Output System","Network Basic Input/Output Session"],"c":"E","s":"","e":"NetBIOS (Network Basic Input/Output System) is the legacy Windows name and session service on ports 137-139."},{"id":148,"q":"How many Bytes has IPv4?","a":"4","d":["6","32","64","128"],"c":"B","s":"","e":"An IPv4 address is 4 bytes (32 bits)."},{"id":149,"q":"How many Bits and Bytes has IPv6?","a":"128 bits and 16 bytes","d":["64 bits and 8 bytes","32 bits and 4 bytes","256 bits and 32 bytes","256 bits and 16 bytes"],"c":"B","s":"","e":"An IPv6 address is 128 bits, which is 16 bytes."},{"id":150,"q":"How many Bytes has a MAC (address)?","a":"6","d":["8","32","48","192"],"c":"B","s":"","e":"A MAC address is 6 bytes long."},{"id":151,"q":"How many Bits has a MAC (address)?","a":"48","d":["2","6","16","32"],"c":"B","s":"","e":"A MAC address is 48 bits long."},{"id":152,"q":"What is the subnet mask of /28?","a":"255.255.255.240","d":["255.255.255.128","255.255.255.100","255.255.255.248","255.255.255.0"],"c":"B","s":"","e":"A /28 has subnet mask 255.255.255.240 (16 addresses, 14 usable hosts)."},{"id":153,"q":"What is the range of a /25 subnet?","a":"255.255.255.128","d":["255.255.255.240","255.255.255.250","255.255.255.255","255.255.255.252"],"c":"B","s":"","e":"A /25 splits the last octet at 128, mask 255.255.255.128."},{"id":154,"q":"What is the subnet mask of 192.168.1.0/255.255.255.248 (RFC1878)?","a":"192.168.1.0/29","d":["192.168.1.0/28","192.168.1.0/27","192.168.1.0/26","192.168.1.0/25"],"c":"B","s":"","e":"The mask 255.255.255.248 equals a /29 (8 addresses)."},{"id":155,"q":"On which OSI layer is SMTP taking place?","a":"Application","d":["Data Link","Physical","Network","Session"],"c":"B","s":"","e":"SMTP operates at the Application layer (Layer 7)."},{"id":156,"q":"Which command on Linux systems will list setuid executable files owned by root?","a":"find / -perm -04000","d":["find / -perm -01000","find / -perm -02000","find / -perm -03000","find / -perm 1000"],"c":"F","s":"","e":"find / -perm -04000 lists root-owned SUID binaries, prime privilege-escalation candidates."},{"id":157,"q":"Which operating system do you expect when you see TTL 64?","a":"Linux","d":["Windows","Mac OSX","Cisco Switch","HP Switch"],"c":"F","s":"","e":"An initial TTL of 64 typically indicates a Linux/Unix host."},{"id":158,"q":"What is the maximum character size of LM Hashes?","a":"14","d":["10","8","48","50"],"c":"E","s":"","e":"LM hashes cap at 14 characters, stored as two 7-character halves, which is part of why they are weak."},{"id":159,"q":"Which public source would you use to look up a specific, publicly disclosed software vulnerability?","a":"The CVE / NVD database (cve.mitre.org and nvd.nist.gov)","d":["NIST SP 800-30, a risk-assessment guide","RFC 1918","The OSI reference model","A WHOIS query"],"c":"E","s":"","e":"Publicly disclosed vulnerabilities are catalogued as CVEs by MITRE and scored in NIST's NVD. NIST SP 800-30 is a risk-assessment methodology, not a vulnerability database."},{"id":160,"q":"In Microsoft patch-management terminology, what does SMS stand for?","a":"Systems Management Server","d":["Safety Management System","Secure Message Service","Short Message Service","Security Monitoring System"],"c":"E","s":"","e":"SMS (Systems Management Server) was Microsoft's software and patch deployment platform, the predecessor to SCCM. It sits alongside SUS, WSUS and MBSA as a Windows patch-management strategy (syllabus E6)."},{"id":161,"q":"What means CRLF?","a":"Carriage Return Line Feed","d":["Carrier Return, Line Feed","Case Return Live Feed","Custom Resource Line Feed","Custom Resource Session"],"c":"H","s":"","e":"CRLF is Carriage Return + Line Feed; injecting it into input can split HTTP headers or log entries (CRLF injection)."},{"id":162,"q":"What does NFS stand for?","a":"Network File System","d":["Network File Share","Network For Security","Network Filter Share","Network File Service"],"c":"F","s":"","e":"NFS stands for Network File System."},{"id":163,"q":"What device is expected if you see\n\nTelnet\n\nUser Access Verification\n\nPassword:","a":"Cisco IOS","d":["Linux","Solaris","Windows","Nortel VPN"],"c":"D","s":"","e":"A Telnet 'User Access Verification / Password:' prompt is the signature of a Cisco IOS device."},{"id":164,"q":"A WPA is connected with TACACS, what answer is true?","a":"The username and password is encrypted inside the whole packet.","d":["The username and password is sent in cleartext.","Only the username is send in cleartext.","A attacker can sniff the whole packet and decode the username and password.","None of all."],"c":"D","s":"","e":"With TACACS+ the entire packet body (including username and password) is encrypted, unlike RADIUS which encrypts only the password."},{"id":165,"q":"A _____ is a delegated DNS entry and will can be subverted into other _____(s)?","a":"Zone","d":["Host","CNAME","SOA","TXT"],"c":"C","s":"","e":"A zone is a delegated DNS entry, and can itself be subverted into further delegated zones (subdomains)."},{"id":166,"q":"What is a CNAME?","a":"A Canonical Name record.","d":["A Custom Name record.","A DNS A record.","A TXT entry.","A MX entry."],"c":"C","s":"","e":"A CNAME (Canonical Name) record aliases one hostname to another."},{"id":167,"q":"What is a common weakness in IIS7?","a":"Malicious Code execution.","d":["Delete arbitary files.","Webroot is browsable.","Denial of Service.","None"],"c":"G","s":"","e":"A common IIS7 weakness cited here is malicious code execution through flawed handlers or modules."},{"id":168,"q":"Where is the Ntds.dit stored?","a":"Windows\\NTDS\\Ntds.dit","d":["Windows\\system32\\Ntds.dit","Windows\\system\\Ntds.dit","Windows\\system32\\config\\Ntds.dit","Windows\\Ntds.dit"],"c":"E","s":"","e":"The AD database Ntds.dit is stored in the Windows NTDS folder on a domain controller."},{"id":169,"q":"Which of the following is a \"Double Encoded\" string?","a":"http://HOST/%252e%2e/%252e%2e/%252e%2e/%252e%2e/boot.ini","d":["http://HOST/%2f%2ef/%2ef%2ef/%2f%2f/%2f%2f/boot.ini","http://HOST/%2s%2s/%2e%2s/%2s%2s/%2s%2s/boot.ini","http://HOST/%23e%2e/%23e%2e/%23e%2e/%23e%2e/boot.ini","http://HOST/%2aaa%2aaa/%2aaa%2eaaa/%2aaa%2aaa/%2aaa%2aaa/boot.ini"],"c":"H","s":"","e":"%252e is %25 ('%') followed by 2e, so it decodes twice to '.', used to slip past filters that decode input only once."},{"id":170,"q":"Which of the following is NOT a valid DNS type?","a":"NWS - News Server","d":["SOA - Start of Authority","CNAME - Canonical Name","MX - Mail Exchange","PTR - Domain Name Pointer"],"c":"C","s":"","e":"NWS is not a real DNS record type; valid ones include A, MX, NS, SOA, PTR, TXT and CNAME."},{"id":171,"q":"Which configuration is supported as authentication server for implemention of 802.11X port-based authentication on Cisco devices?","a":"RADIUS security system with EAP extensions","d":["TACACS+ security system with EAP extensions","TACACS+ security system","RADIUS security system with 3DES extensions","RADIUS security system with DES extensions"],"c":"D","s":"","e":"802.1X port-based authentication uses a RADIUS server with EAP extensions as the authentication back-end."},{"id":172,"q":"Whats does hosts.equiv do when it looks like this host+ donald duck","a":"Both, donald and duck can connect.","d":["Only duck is allowed to connect as donald on the local system.","Only donald is allowed to connect as donald on the local system.","Both users are not allowed to login to the host.","The file is invalid"],"c":"F","s":"","e":"A '+' in hosts.equiv trusts everyone, so the listed accounts (and effectively any host/user) can connect without authentication."},{"id":173,"q":"What does the (3) three combo in cyber security mean?","a":"Server, Application, Database","d":["Firewall, Server, Application","Superusers, Users, Guests","Router, Network, Switches","Windows, Linux, MAC OSx"],"c":"F","s":"","e":"The three tiers referenced are the Server, Application and Database layers."},{"id":174,"q":"On which Port does Oracle TNS listen?","a":"1521","d":["1566","2433","5666","5667"],"c":"J","s":"","e":"Oracle's TNS listener default port is TCP 1521."},{"id":175,"q":"On which Port does TACACS listen?","a":"49","d":["143","21","995","1234"],"c":"D","s":"","e":"TACACS listens on port 49."},{"id":176,"q":"Which system do you expect when Port 2301 shows up in a port scan result?","a":"HPE Management device or VMS \"(OpenVMS\")","d":["Linux device","Windows device","Mac OSX device","Cisco Switch"],"c":"D","s":"","e":"Port 2301 typically indicates an HP System/Insight Management web agent (or OpenVMS)."},{"id":177,"q":"What command shows the version of a Oracle RDBMS?","a":"tnscmd10g version -h 192.168.1.100","d":["tnsping 192.168.1.100","tnstrace version -h 192.168.1.100","tcmd10g version -h 192.168.1.100","sqlplus version -h 192.168.1.100"],"c":"J","s":"","e":"tnscmd10g version queries the Oracle TNS listener and returns its version."},{"id":178,"q":"What password hash type is this exactly?\n\n$1$h6k3X5db$pp8WQ5R5YYL5bNyQj2wP70","a":"MD5","d":["SHA1","SHA256","crypt\"(3\")","Blowfish"],"c":"B","s":"","e":"The $1$ prefix marks a salted MD5 (crypt) password hash."},{"id":179,"q":"Which server is meant when you see http://HOST/~username/index.html in the web log getting bruteforced?","a":"Apache","d":["IIS","Python Webserver","IBM Websphere","Nginx"],"c":"G","s":"","e":"The ~username path is Apache's mod_userdir feature serving per-user home directories."},{"id":180,"q":"What device is meant when a ping result is howing \"TTL=123\"?","a":"It is a \"Windows\" machine 5 hops away.","d":["It is a \"Linux\" machine 65 hops away.","It is a \"Cisco\" switch 5 hops away.","It is a \"HPUX\" device 126 hops away","It is a \"Mac\" with 8 hops away."],"c":"D","s":"","e":"A TTL near 123 (128 minus a few hops) indicates a Windows host a few hops away, since Windows defaults to TTL 128."},{"id":181,"q":"A client in a previous pentest got the recommendation to uncomment the \"mod_userdir\" directive. Which server system was meant?","a":"Apache Webserver","d":["Lightspeed Webserver","Eclipse Jetty Webserver","Microsoft IIS Webserver","Nginx Webserver"],"c":"G","s":"","e":"mod_userdir is an Apache directive that serves per-user web directories."},{"id":182,"q":"What is an URI?","a":"Uniform Resource Identifier","d":["Uniform Resource Identification","Uniform Redirect Identifier","Universal Resource Identifier","Universal Redirect Identification"],"c":"F","s":"","e":"URI stands for Uniform Resource Identifier; a URL is one specific type of URI."},{"id":183,"q":"Which commandline util identifies programs and files loaded on start?","a":"strace","d":["ls","select","grep","troff"],"c":"F","s":"","e":"strace traces a process's system calls, revealing the programs and files it loads."},{"id":184,"q":"When testing a Microsoft IIS for blind SQL injection, which statement would be used?","a":"';WAITFOR DELAY ‘0:0:5’--","d":["SLEEP 5;","sleep(5)","mdrand(a,10)","PAUSE 5"],"c":"I","s":"","e":"WAITFOR DELAY '0:0:5' is the MSSQL time-delay used to confirm blind SQL injection by the response lag."},{"id":185,"q":"When testing a Oracle database for blind SQL injection, which statement would be used?","a":"'dbms_lock.sleep(5) or dbms.session.sleep(5)","d":["PAUSE","sleep(5)",";WAITFOR DELAY '0:0:5'--","pg_sleep((ASCII((SELECT `a`))"],"c":"I","s":"","e":"dbms_lock.sleep(5) is Oracle's time-delay function for confirming blind SQL injection."},{"id":186,"q":"When testing a MySQL databse for blind SQL injection, which statement would be used?","a":"sleep(5)","d":["SLEEP 5;--","'mdrand(a,10)",";WAITFOR DELAY ‘0:0:5’--","PAUSE"],"c":"I","s":"","e":"sleep(5) is MySQL's time-delay function for confirming blind SQL injection."},{"id":187,"q":"During a pentest the \"sa\" account was dumped from a database. What is the salt in \n\n\"0100F733058A07892C5CACE899768F89965F6BD1DED7955FE89E1C9A10E27849B0B213B5CE92CC9347ECCB34C3EFADAF2FD99BFFECD8D9150DD6AACB5D409A9D2652A4E0AF16\"?","a":"F733058A07","d":["0100F73305","92C5CACE89","9D2652A4E0AF16","0100"],"c":"B","s":"","e":"In that hash string the salt is the segment shown (F733058A07)."},{"id":188,"q":"How many possible hosts are in class A network?","a":"16777214","d":["65536","16384","8096","512"],"c":"B","s":"","e":"A class A network (/8) has 2^24 - 2 = 16,777,214 usable hosts."},{"id":189,"q":"How many possible hosts are in class B network?","a":"65534","d":["16777214","65535","16384","8192"],"c":"B","s":"","e":"A class B network (/16) has 2^16 - 2 = 65,534 usable hosts."},{"id":190,"q":"How many possible hosts are in /25 network?","a":"128","d":["64","156","192","6619999"],"c":"B","s":"","e":"A /25 contains 128 addresses (126 usable hosts)."},{"id":191,"q":"What port listens RIP on?","a":"520","d":["49","631","965","587"],"c":"D","s":"","e":"RIP listens on UDP port 520."},{"id":192,"q":"What is the definition of JSP?","a":"Java Server Pages","d":["Java Secure Pages","Java System Pages","Java Security Pages","Java Servlet Pages"],"c":"G","
